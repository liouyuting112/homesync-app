<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>HomeSync 家庭管家 | 終極連動版</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700;900&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>

    <style>
        :root {
            --pri: #6336f1;
            --pri-bg: #f5f6ff;
            --bg: #f8fafc;
            --w: #fff;
            --txt: #111827;
            --sub: #6b7280;
            --grn: #10b981;
            --red: #ef4444;
            --rad: 28px;
            --sh: 0 15px 30px rgba(0, 0, 0, 0.1);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'Noto Sans TC', sans-serif;
            background: #e5e7eb;
            color: var(--txt);
            display: flex;
            justify-content: center;
            min-height: 100vh;
        }

        .shell {
            width: 100%;
            max-width: 440px;
            background: #fff;
            display: flex;
            flex-direction: column;
            position: relative;
            min-height: 100vh;
            box-shadow: 0 0 60px rgba(0, 0, 0, 0.1);
        }

        /* 遮罩 */
        .overlay {
            position: fixed;
            inset: 0;
            z-index: 9999;
            background: #fff;
            display: flex;
            flex-direction: column;
            padding: 40px 25px;
            max-width: 440px;
            margin: 0 auto;
            transition: 0.3s;
        }

        .overlay.hide {
            opacity: 0;
            pointer-events: none;
            transform: translateY(30px);
        }

        .step {
            flex: 1;
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
        }

        .step.active {
            display: flex;
        }

        .overlay h1 {
            font-size: 36px;
            font-weight: 900;
            color: var(--pri);
            margin-bottom: 15px;
        }

        .overlay p {
            color: var(--sub);
            font-size: 15px;
            margin-bottom: 40px;
            line-height: 1.6;
        }

        .inp-v {
            width: 100%;
            border: 3px solid #f1f5f9;
            background: #f8fafc;
            padding: 22px;
            border-radius: 24px;
            font-size: 19px;
            font-weight: 800;
            text-align: center;
            margin-bottom: 25px;
            outline: none;
            transition: 0.2s;
        }

        .inp-v:focus {
            border-color: var(--pri);
            background: #fff;
            box-shadow: 0 0 0 5px var(--pri-bg);
        }

        .btn-v {
            width: 100%;
            padding: 22px;
            border-radius: 100px;
            background: var(--pri);
            color: #fff;
            font-size: 19px;
            font-weight: 900;
            border: none;
            cursor: pointer;
            box-shadow: 0 15px 30px rgba(99, 54, 241, 0.35);
            transition: 0.2s;
        }

        /* 角色網格 */
        .role-grid {
            width: 100%;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 25px;
            max-height: 40vh;
            overflow-y: auto;
            padding: 10px;
        }

        .role-i {
            background: #f9fafb;
            border: 3px solid #f1f5f9;
            border-radius: 28px;
            padding: 30px 10px;
            cursor: pointer;
            text-align: center;
            transition: 0.2s;
            position: relative;
        }

        .role-i.on {
            border-color: var(--pri);
            background: var(--pri-bg);
            transform: translateY(-5px);
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.05);
        }

        .role-i .em {
            font-size: 50px;
            display: block;
            margin-bottom: 10px;
        }

        .role-i b {
            font-size: 17px;
            font-weight: 900;
        }

        .add-bar {
            background: #f1f5f9;
            padding: 25px;
            border-radius: 30px;
            width: 100%;
            margin-bottom: 20px;
            text-align: left;
        }

        .inp-row {
            display: flex;
            gap: 10px;
        }

        .inp-row input {
            flex: 1;
            border: none;
            padding: 18px;
            border-radius: 18px;
            font-weight: 800;
            font-size: 16px;
            outline: none;
        }

        .inp-row button {
            background: var(--pri);
            color: #fff;
            border: none;
            padding: 0 25px;
            border-radius: 18px;
            font-weight: 900;
        }

        #app {
            display: none;
            flex: 1;
            flex-direction: column;
        }

        .top {
            padding: 35px 20px 25px;
            background: #fff;
            border-bottom: 1px solid #f1f5f9;
        }

        .top-r {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
        }

        .top h2 {
            font-weight: 900;
            color: var(--pri);
            font-size: 28px;
        }

        .tag-sync {
            font-size: 10px;
            color: var(--grn);
            background: #d1fae5;
            padding: 5px 12px;
            border-radius: 100px;
            font-weight: 900;
            display: inline-flex;
            align-items: center;
            gap: 5px;
            margin-top: 8px;
        }

        .btn-share {
            background: #fbbf24;
            color: #92400e;
            padding: 12px 20px;
            border-radius: 18px;
            font-size: 13px;
            font-weight: 900;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .wall {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-top: 25px;
        }

        .p-item {
            display: flex;
            align-items: center;
            gap: 18px;
            padding: 18px 24px;
            background: #f9fafb;
            border-radius: 25px;
            border: 2.5px solid transparent;
            transition: 0.3s;
        }

        .p-item.me {
            background: var(--pri-bg);
            border-color: rgba(99, 54, 241, 0.15);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.03);
        }

        .p-av {
            width: 52px;
            height: 52px;
            background: #fff;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            box-shadow: 0 8px 16px rgba(0, 0, 0, 0.08);
        }

        .main {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: var(--sub);
            padding: 40px;
        }

        .nav {
            position: fixed;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 100%;
            max-width: 440px;
            background: rgba(255, 255, 255, 0.98);
            backdrop-filter: blur(15px);
            border-top: 1px solid #f1f5f9;
            display: flex;
            padding: 15px 0 35px;
            z-index: 500;
        }

        .nav-i {
            flex: 1;
            text-align: center;
            color: var(--sub);
            font-size: 12px;
            font-weight: 900;
        }

        .nav-i.on {
            color: var(--pri);
        }

        .nav-i .ic {
            font-size: 28px;
            display: block;
            margin-bottom: 5px;
        }

        #toast {
            position: fixed;
            bottom: 130px;
            left: 50%;
            transform: translateX(-50%);
            background: #1e293b;
            color: #fff;
            padding: 14px 35px;
            border-radius: 60px;
            font-size: 15px;
            font-weight: 800;
            opacity: 0;
            transition: 0.3s;
            z-index: 10000;
        }

        .btn-reset {
            position: absolute;
            bottom: 40px;
            right: 20px;
            font-size: 11px;
            color: var(--sub);
            background: none;
            border: none;
            text-decoration: underline;
            cursor: pointer;
        }
    </style>
</head>

<body>

    <div class="shell">
        <!-- 引導流程牆 -->
        <div class="overlay" id="ov-wall">
            <!-- 步驟 1: 命名家 -->
            <div class="step" id="st-home">
                <div style="font-size:75px; margin-bottom:20px">🏡</div>
                <h1>建立家庭網區</h1>
                <p>第一步：請先為家庭空間命名</p>
                <input class="inp-v" id="in-f-nm" placeholder="家庭名稱（如：我們家）" maxlength="12">
                <button class="btn-v" onclick="doMakeHome()">開始建立空間 ✨</button>
            </div>

            <!-- 步驟 2: 我是誰 -->
            <div class="step" id="st-who">
                <h1 id="who-title">我是誰？</h1>
                <p>第二步：請新增或選取您的成員分身</p>
                <div class="role-grid" id="grid-ui"></div>
                <div class="add-bar">
                    <div class="inp-row">
                        <input id="in-m-nm" placeholder="您的名字 (例如: 爸爸)" maxlength="6">
                        <button onclick="doAddM()">新增</button>
                    </div>
                </div>
                <button class="btn-v" id="btn-final" disabled onclick="doFinalEnter()">確定是我，進入工具 ✨</button>
                <button class="btn-reset" onclick="hardReset()">重設所有資料 (測試用)</button>
            </div>
        </div>

        <!-- 主 App -->
        <div id="app">
            <header class="top">
                <div class="top-r">
                    <div>
                        <h2 id="top-title">HomeSync</h2>
                        <div class="tag-sync">● 已與全家人連動中</div>
                    </div>
                    <div class="btn-share" onclick="doShare()">🔗 分享與邀請</div>
                </div>
                <div class="wall" id="wall-ui"></div>
            </header>
            <main class="main">
                <div style="font-size:75px">💡</div>
                <h3 style="margin-top:20px">已開啟實時同步</h3>
                <p style="margin-top:10px; font-size:14px">現在您與家人新增的任務</p>
                <p style="font-size:14px">都會雙向自動出現。</p>
            </main>
            <nav class="nav">
                <div class="nav-i on"><span class="ic">🏠</span>首頁</div>
                <div class="nav-i"><span class="ic">✋</span>託付</div>
                <div class="nav-i"><span class="ic">🛒</span>採買</div>
                <div class="nav-i"><span class="ic">📦</span>庫存</div>
            </nav>
        </div>
    </div>

    <div id="toast"></div>

    <script>
        // --- 家庭連動 V12：修正密鑰不一致與同步斷點 ---
        const fbURL = "https://homesync-private-default-rtdb.firebaseio.com";
        firebase.initializeApp({ databaseURL: fbURL });
        const rdb = firebase.database();

        let fK = '', fN = '', myID = '', memberMap = {};

        (function lifecycle() {
            const p = new URLSearchParams(window.location.search);
            const join = p.get('join');
            const saved = localStorage.getItem('hs_k_v12');

            if (join) {
                // 【家人加入】：強制使用邀請碼
                fK = join;
                localStorage.setItem('hs_k_v12', fK);
                startRealSync();
            } else if (saved) {
                // 【老用戶回歸】
                fK = saved;
                myID = localStorage.getItem('hs_me_' + fK);
                startRealSync();
                if (myID) {
                    document.getElementById('ov-wall').classList.add('hide');
                    document.getElementById('app').style.display = 'flex';
                }
            } else {
                // 【第一人建立者】
                showStep('home');
            }
        })();

        function showStep(s) {
            document.querySelectorAll('.step').forEach(d => d.classList.remove('active'));
            document.getElementById('st-' + s).classList.add('active');
        }

        function startRealSync() {
            // 1. 同步家名
            rdb.ref(`hs/v12/${fK}/nm`).on('value', s => {
                fN = s.val() || '我們的家';
                document.getElementById('top-title').textContent = fN;
                document.getElementById('who-title').textContent = fN + " 是誰？";
            });

            // 2. 同步成員 (重點：修正解密金鑰一致性)
            rdb.ref(`hs/v12/${fK}/users`).on('value', snap => {
                const data = snap.val() || {};
                memberMap = {};
                Object.keys(data).forEach(id => {
                    try {
                        // 使用 fK 的前 16 位作為極簡穩定金鑰
                        const safeKey = fK.substring(0, 16);
                        const bytes = CryptoJS.AES.decrypt(data[id], safeKey);
                        memberMap[id] = JSON.parse(bytes.toString(CryptoJS.enc.Utf8));
                    } catch (e) { console.error("解密出錯"); }
                });
                renderUI();
            });
            showStep('who');
        }

        function doMakeHome() {
            const val = document.getElementById('in-f-nm').value.trim();
            if (!val) return;
            fN = val;
            // 生成極簡安全 ID，避免符號導致解密失敗
            fK = 'HS' + Math.random().toString(36).substr(2, 10).toUpperCase();
            localStorage.setItem('hs_k_v12', fK);
            rdb.ref(`hs/v12/${fK}/nm`).set(fN);
            startRealSync();
        }

        function renderUI() {
            // 渲染 STEP 2 選擇清單
            const grid = document.getElementById('grid-ui');
            grid.innerHTML = Object.keys(memberMap).map(id => `
        <div class="role-i ${myID == id ? 'on' : ''}" onclick="setMyID('${id}')">
            <span class="em">${memberMap[id].e || '🙋'}</span>
            <b>${memberMap[id].n}</b>
        </div>
    `).join('');

            // 渲染主 App 牆面
            const wall = document.getElementById('wall-ui');
            if (myID && wall) {
                wall.innerHTML = Object.keys(memberMap).map(id => `
            <div class="p-item ${id == myID ? 'me' : ''}">
                <div class="p-av">${memberMap[id].e || '🙋'}</div>
                <b>${memberMap[id].n}${id == myID ? ' (我)' : ''}</b>
            </div>
        `).join('');
            }
        }

        function setMyID(id) {
            myID = id;
            renderUI();
            document.getElementById('btn-final').disabled = false;
        }

        function doAddM() {
            const n = document.getElementById('in-m-nm').value.trim();
            if (!n) return;
            const mid = 'M' + Date.now();
            const obj = { n, e: '🙋' };
            const safeKey = fK.substring(0, 16);
            const enc = CryptoJS.AES.encrypt(JSON.stringify(obj), safeKey).toString();

            // 核心修復：立即寫入 Firebase
            rdb.ref(`hs/v12/${fK}/users/${mid}`).set(enc);
            document.getElementById('in-m-nm').value = '';
            toast('成功！請在清單中選取您的名字進入');
        }

        function doFinalEnter() {
            if (!myID) return;
            localStorage.setItem('hs_me_' + fK, myID);
            document.getElementById('ov-wall').classList.add('hide');
            document.getElementById('app').style.display = 'flex';
            renderUI();
        }

        function doShare() {
            const url = window.location.origin + window.location.pathname + '?join=' + fK;
            navigator.clipboard.writeText(url).then(() => toast('🔗 已複製連動連結！快傳給家人吧'));
        }

        function hardReset() { localStorage.clear(); location.href = location.pathname; }
        function toast(m) { const t = document.getElementById('toast'); t.style.opacity = 1; t.textContent = m; setTimeout(() => t.style.opacity = 0, 2500); }
    </script>
</body>

</html>
