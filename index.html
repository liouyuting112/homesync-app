<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>HomeSync 家庭管家 | 實時連動版</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700;900&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>

    <style>
        :root {
            --pri: #6366f1;
            --pri-bg: #f5f6ff;
            --bg: #f9fafb;
            --w: #fff;
            --txt: #111827;
            --sub: #6b7280;
            --grn: #10b981;
            --red: #ef4444;
            --rad: 25px;
            --sh: 0 15px 30px -5px rgba(0, 0, 0, 0.1);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'Noto Sans TC', sans-serif;
            background: #e5e7eb;
            color: var(--txt);
            display: flex;
            justify-content: center;
            min-height: 100vh;
        }

        .shell {
            width: 100%;
            max-width: 440px;
            background: #fff;
            display: flex;
            flex-direction: column;
            position: relative;
            min-height: 100vh;
            box-shadow: 0 0 60px rgba(0, 0, 0, 0.1);
            overflow-x: hidden;
        }

        /* 引導牆面 */
        .onboard {
            position: fixed;
            inset: 0;
            z-index: 9999;
            background: #fff;
            display: flex;
            flex-direction: column;
            padding: 40px 25px;
            max-width: 440px;
            margin: 0 auto;
            transition: 0.4s;
        }

        .onboard.hide {
            opacity: 0;
            pointer-events: none;
            transform: translateY(30px);
        }

        .step {
            flex: 1;
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
        }

        .step.active {
            display: flex;
        }

        .onboard h1 {
            font-size: 34px;
            font-weight: 900;
            color: var(--pri);
            margin-bottom: 8px;
        }

        .onboard p {
            color: var(--sub);
            font-size: 14px;
            margin-bottom: 30px;
            line-height: 1.6;
        }

        /* 輸入與按鈕 */
        .inp-f {
            width: 100%;
            border: 3px solid #f1f5f9;
            background: #f8fafc;
            padding: 20px;
            border-radius: 20px;
            font-size: 18px;
            font-weight: 800;
            text-align: center;
            margin-bottom: 20px;
            outline: none;
        }

        .inp-f:focus {
            border-color: var(--pri);
            background: #fff;
        }

        .btn-p {
            width: 100%;
            padding: 20px;
            border-radius: 100px;
            background: var(--pri);
            color: #fff;
            font-size: 18px;
            font-weight: 900;
            border: none;
            cursor: pointer;
            box-shadow: 0 10px 25px rgba(99, 102, 241, 0.3);
        }

        /* 角色選擇 */
        .role-grid {
            width: 100%;
            max-height: 40vh;
            overflow-y: auto;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-bottom: 20px;
            padding: 5px;
        }

        .role-i {
            background: #f8fafc;
            border: 3px solid #f1f5f9;
            border-radius: 22px;
            padding: 25px 10px;
            cursor: pointer;
            transition: 0.2s;
            text-align: center;
        }

        .role-i.on {
            border-color: var(--pri);
            background: var(--pri-bg);
        }

        .role-i .em {
            font-size: 44px;
            display: block;
            margin-bottom: 8px;
        }

        .role-i b {
            font-size: 16px;
            font-weight: 900;
        }

        .add-tool {
            background: #f1f5f9;
            padding: 20px;
            border-radius: 25px;
            width: 100%;
            margin-bottom: 20px;
            text-align: left;
        }

        .add-tool label {
            font-size: 11px;
            font-weight: 900;
            color: var(--sub);
            display: block;
            margin-bottom: 10px;
            margin-left: 5px;
        }

        .inp-row {
            display: flex;
            gap: 8px;
        }

        .inp-row input {
            flex: 1;
            border: none;
            padding: 15px;
            border-radius: 15px;
            font-weight: 800;
            outline: none;
        }

        .inp-row button {
            background: var(--pri);
            color: #fff;
            border: none;
            padding: 0 20px;
            border-radius: 15px;
            font-weight: 900;
        }

        /* 主介面 */
        #app {
            display: none;
            flex: 1;
            flex-direction: column;
            overflow: hidden;
        }

        .header {
            padding: 30px 20px 15px;
            background: #fff;
            border-bottom: 1px solid #f1f5f9;
        }

        .header-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .status-dot {
            font-size: 10px;
            color: var(--grn);
            background: #d1fae5;
            padding: 4px 10px;
            border-radius: 8px;
            font-weight: 900;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .invite-btn {
            background: #fef3c7;
            color: #92400e;
            padding: 10px 18px;
            border-radius: 15px;
            font-size: 12px;
            font-weight: 900;
            cursor: pointer;
        }

        .wall {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .p-card {
            display: flex;
            align-items: center;
            gap: 15px;
            padding: 15px;
            background: #f9fafb;
            border-radius: 20px;
            border: 2px solid transparent;
        }

        .p-card.me {
            background: var(--pri-bg);
            border-color: rgba(99, 102, 241, 0.1);
        }

        .p-av {
            width: 44px;
            height: 44px;
            background: #fff;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            box-shadow: var(--sh);
        }

        #view-content {
            flex: 1;
            padding: 20px;
            position: relative;
        }

        .empty-msg {
            margin-top: 60px;
            text-align: center;
            color: var(--sub);
        }

        .nav {
            position: fixed;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 100%;
            max-width: 440px;
            background: rgba(255, 255, 255, 0.98);
            backdrop-filter: blur(15px);
            border-top: 1px solid #f1f5f9;
            display: flex;
            padding: 15px 0 35px;
            z-index: 500;
        }

        .nav-i {
            flex: 1;
            text-align: center;
            color: var(--sub);
            font-size: 11px;
            font-weight: 900;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 5px;
        }

        .nav-i.active {
            color: var(--pri);
        }

        .nav-i .ic {
            font-size: 24px;
        }

        #toast {
            position: fixed;
            bottom: 120px;
            left: 50%;
            transform: translateX(-50%);
            background: #1e293b;
            color: #fff;
            padding: 12px 30px;
            border-radius: 50px;
            font-size: 14px;
            font-weight: 800;
            opacity: 0;
            transition: .3s;
            z-index: 9999;
        }
    </style>
</head>

<body>

    <div class="shell">
        <!-- 引導牆面 -->
        <div class="onboard" id="ob-wall">
            <div class="step" id="st-name">
                <div style="font-size:60px">🏯</div>
                <h1>HomeSync</h1>
                <p>首先，請為家庭空間命名</p>
                <input class="inp-f" id="f-name-i" placeholder="例如：我們這一家" maxlength="12">
                <button class="btn-p" onclick="doCreate()">開始建立 ✨</button>
            </div>

            <div class="step" id="st-role">
                <h1 style="font-size:28px">我是誰？</h1>
                <p>邀請者與家人都必須選取自己的身分</p>
                <div class="role-grid" id="list-render"></div>
                <div class="add-tool">
                    <label>沒在清單上？</label>
                    <div class="inp-row">
                        <input id="new-name-i" placeholder="您的名字" maxlength="6">
                        <button onclick="addNewM()">新增</button>
                    </div>
                </div>
                <button class="btn-p" id="btn-start" disabled onclick="doFinal()">確定是我，進入工具 ✨</button>
            </div>
        </div>

        <!-- 主 App 區 -->
        <div id="app">
            <header class="header">
                <div class="header-row">
                    <div>
                        <h2 id="f-name-show">HomeSync</h2>
                        <div class="status-dot">● 已安全同步中</div>
                    </div>
                    <div class="invite-btn" onclick="shareMe()">🔗 邀請家人</div>
                </div>
                <div class="wall" id="wall-render"></div>
            </header>
            <main id="view-content">
                <div class="empty-msg">
                    <div style="font-size:60px">💡</div>
                    <h3>已與家人連動</h3>
                    <p>點擊下方功能開始共同管理</p>
                </div>
            </main>
            <nav class="nav">
                <div class="nav-i active"><span class="ic">🏠</span>首頁</div>
                <div class="nav-i"><span class="ic">✋</span>託付</div>
                <div class="nav-i"><span class="ic">🛒</span>採買</div>
                <div class="nav-i"><span class="ic">📦</span>庫存</div>
            </nav>
        </div>
    </div>

    <div id="toast"></div>

    <script>
        // --- 實時連動核心引擎 (V9) ---
        const dbURL = "https://homesync-private-default-rtdb.firebaseio.com";
        firebase.initializeApp({ databaseURL: dbURL });
        const rdb = firebase.database();

        let famK = '', famN = '', meId = '', DB = { m: {}, t: {}, s: {}, v: {} };

        // 1. 生命週期：判斷是建立者還是被邀請者
        (function init() {
            const params = new URLSearchParams(location.search);
            const joinCode = params.get('join');
            const savedKey = localStorage.getItem('hs_k_v9');

            if (joinCode) {
                // 【家人加入】: 強制使用邀請碼
                famK = joinCode;
                localStorage.setItem('hs_k_v9', famK);
                startSync();
            } else if (savedKey) {
                // 【老用戶】
                famK = savedKey;
                meId = localStorage.getItem('hs_me_' + famK);
                startSync();
                if (meId) {
                    document.getElementById('ob-wall').classList.add('hide');
                    document.getElementById('app').style.display = 'flex';
                } else {
                    showStep('role');
                }
            } else {
                // 【建立者】
                showStep('name');
            }
        })();

        function showStep(s) {
            document.querySelectorAll('.step').forEach(div => div.classList.remove('active'));
            document.getElementById('st-' + s).classList.add('active');
        }

        // 實時連動監聽
        function startSync() {
            rdb.ref('hs/v9/' + famK).on('value', snap => {
                const raw = snap.val();
                if (!raw) return;
                famN = raw.n || '我家';
                if (raw.d) {
                    try {
                        const bytes = CryptoJS.AES.decrypt(raw.d, famK);
                        DB = JSON.parse(bytes.toString(CryptoJS.enc.Utf8));
                    } catch (e) { console.error("解密失敗"); }
                }
                renderRoles();
                if (meId) renderApp();
            });
            showStep('role');
        }

        function save() {
            const enc = CryptoJS.AES.encrypt(JSON.stringify(DB), famK).toString();
            rdb.ref('hs/v9/' + famK).update({ n: famN, d: enc, ts: Date.now() });
        }

        // 2. 引導邏輯
        function doCreate() {
            const val = document.getElementById('f-name-i').value.trim();
            if (!val) return;
            famN = val;
            famK = 'k' + Math.random().toString(36).substr(2, 12);
            localStorage.setItem('hs_k_v9', famK);
            save();
            startSync();
        }

        function renderRoles() {
            const grid = document.getElementById('list-render');
            const ms = DB.m || {};
            grid.innerHTML = Object.keys(ms).map(id => `
    <div class="role-i ${meId == id ? 'on' : ''}" onclick="selMe('${id}')">
      <span class="em">${ms[id].e || '🙋'}</span>
      <b>${ms[id].n}</b>
    </div>
  `).join('');
        }

        function selMe(id) {
            meId = id;
            renderRoles();
            document.getElementById('btn-start').disabled = false;
        }

        function addNewM() {
            const n = document.getElementById('new-name-i').value.trim();
            if (!n) return;
            const id = 'm' + Date.now();
            if (!DB.m) DB.m = {};
            DB.m[id] = { n, e: '🙋', ts: Date.now() };

            // 關鍵：先在畫面上顯示
            renderRoles();
            save();
            document.getElementById('new-name-i').value = '';
        }

        function doFinal() {
            if (!meId) return;
            localStorage.setItem('hs_me_' + famK, meId);
            document.getElementById('ob-wall').classList.add('hide');
            document.getElementById('app').style.display = 'flex';
            document.getElementById('f-name-show').textContent = famN;
            renderApp();
        }

        // 3. App 功能渲染
        function renderApp() {
            const ms = DB.m || {};
            document.getElementById('wall-render').innerHTML = Object.keys(ms).map(id => `
    <div class="p-card ${id == meId ? 'me' : ''}">
      <div class="p-av">${ms[id].e || '🙋'}</div>
      <b>${ms[id].n}${id == meId ? ' (我)' : ''}</b>
    </div>
  `).join('');
        }

        function shareMe() {
            const url = window.location.href.split('?')[0] + '?join=' + famK;
            navigator.clipboard.writeText(url).then(() => toast('🔗 家庭連動連結已複製！傳給家人吧'));
        }

        function toast(m) { const t = document.getElementById('toast'); t.textContent = m; t.style.opacity = 1; setTimeout(() => t.style.opacity = 0, 2500); }
    </script>
</body>

</html>
