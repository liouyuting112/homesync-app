<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>HomeSync 家庭管家 | 安全加密</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap"
        rel="stylesheet">
    <!-- 資安與雲端庫 -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>

    <style>
        :root {
            --pri: #6366f1;
            --priL: #f0f1ff;
            --bg: #f9fafb;
            --w: #ffffff;
            --txt: #111827;
            --sub: #6b7280;
            --grn: #10b981;
            --org: #f59e0b;
            --red: #ef4444;
            --rad: 24px;
            --sh: 0 12px 24px -6px rgba(0, 0, 0, 0.1);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'Noto Sans TC', sans-serif;
            background: #f3f4f6;
            color: var(--txt);
            display: flex;
            justify-content: center;
            min-height: 100vh;
        }

        .shell {
            width: 100%;
            max-width: 440px;
            background: var(--w);
            display: flex;
            flex-direction: column;
            position: relative;
            box-shadow: 0 0 50px rgba(0, 0, 0, 0.05);
        }

        /* --- 建立家庭 (第一步) --- */
        .sc-init {
            position: fixed;
            inset: 0;
            z-index: 9000;
            background: linear-gradient(145deg, #6366f1, #8b5cf6);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 25px;
            transition: 0.4s;
        }

        .sc-init.hide {
            opacity: 0;
            pointer-events: none;
        }

        .card-init {
            background: #fff;
            width: 100%;
            border-radius: 35px;
            padding: 45px 30px;
            text-align: center;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.25);
        }

        .card-init h1 {
            font-weight: 900;
            font-size: 32px;
            color: var(--pri);
            margin-bottom: 10px;
        }

        .card-init p {
            font-size: 14px;
            color: var(--sub);
            line-height: 1.6;
            margin-bottom: 30px;
        }

        /* --- 角色選擇 (第二步) --- */
        .sc-role {
            position: fixed;
            inset: 0;
            z-index: 8000;
            background: #fff;
            padding: 40px 25px;
            display: none;
            flex-direction: column;
            max-width: 440px;
            margin: 0 auto;
        }

        .sc-role h2 {
            font-weight: 900;
            font-size: 26px;
            margin-bottom: 5px;
        }

        .sc-role p {
            color: var(--sub);
            font-size: 13px;
            margin-bottom: 20px;
        }

        .role-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin: 20px 0;
            overflow-y: auto;
            flex: 1;
            padding: 5px;
            align-content: start;
        }

        .role-c {
            background: #f9fafb;
            border: 3px solid transparent;
            border-radius: 22px;
            padding: 25px 10px;
            text-align: center;
            transition: 0.2s;
            cursor: pointer;
        }

        .role-c.on {
            border-color: var(--pri);
            background: var(--priL);
        }

        .role-c .em {
            font-size: 48px;
            display: block;
            margin-bottom: 5px;
        }

        .role-c .nm {
            font-size: 16px;
            font-weight: 900;
        }

        .add-m-box {
            background: #f3f4f6;
            padding: 20px;
            border-radius: 25px;
            margin-bottom: 20px;
        }

        .add-m-box p {
            font-size: 12px;
            font-weight: 800;
            color: var(--sub);
            margin-bottom: 10px;
        }

        .inp-row {
            display: flex;
            gap: 10px;
        }

        .inp-row input {
            flex: 1;
            border: none;
            padding: 15px;
            border-radius: 15px;
            font-weight: 800;
            font-size: 15px;
            outline: none;
        }

        .inp-row button {
            background: var(--pri);
            color: #fff;
            border: none;
            padding: 0 20px;
            border-radius: 15px;
            font-weight: 900;
            transition: .15s;
        }

        .inp-row button:active {
            transform: scale(0.95);
        }

        /* --- 通用屬性 --- */
        .inp-main {
            width: 100%;
            border: 3px solid #f1f5f9;
            background: #f8fafc;
            padding: 18px;
            border-radius: 20px;
            font-size: 17px;
            font-weight: 900;
            text-align: center;
            margin-bottom: 15px;
            outline: none;
        }

        .inp-main:focus {
            border-color: var(--pri);
            background: #fff;
        }

        .btn-main {
            width: 100%;
            padding: 18px;
            border: none;
            border-radius: 50px;
            font-size: 17px;
            font-weight: 900;
            color: #fff;
            background: var(--pri);
            box-shadow: 0 10px 20px rgba(99, 102, 241, 0.3);
            cursor: pointer;
            transition: .15s;
        }

        .btn-main:active {
            transform: scale(0.96);
        }

        .btn-main:disabled {
            background: #cbd5e1;
            box-shadow: none;
            cursor: not-allowed;
        }

        /* --- 進入主 APP (第三步) --- */
        #sc-app {
            display: none;
            flex: 1;
            flex-direction: column;
            overflow: hidden;
        }

        .top {
            padding: 25px 20px 15px;
            background: #fff;
            border-bottom: 1px solid #f3f4f6;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .top-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }

        .top h1 {
            font-size: 24px;
            font-weight: 900;
            color: var(--pri);
        }

        .inv-btn {
            font-size: 12px;
            font-weight: 900;
            color: #92400e;
            background: #fef3c7;
            padding: 9px 18px;
            border-radius: 15px;
            cursor: pointer;
            animation: bounce 2s infinite;
        }

        @keyframes bounce {

            0%,
            100% {
                transform: scale(1)
            }

            50% {
                transform: scale(1.05)
            }
        }

        .wall {
            display: flex;
            flex-direction: column;
            gap: 8px;
            padding-bottom: 15px;
        }

        .ppl-i {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 18px;
            background: #f9fafb;
            border-radius: 20px;
        }

        .ppl-i.me {
            background: var(--priL);
            border: 2px solid rgba(99, 102, 241, 0.1);
        }

        .ppl-av {
            width: 46px;
            height: 46px;
            background: #fff;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            box-shadow: var(--sh);
        }

        .ppl-info b {
            font-size: 16px;
            font-weight: 900;
            display: block;
        }

        .ppl-note {
            font-size: 11px;
            color: var(--sub);
            margin-top: 2px;
        }

        /* 介面操作 */
        .main {
            flex: 1;
            overflow-y: auto;
            padding: 0 20px 140px;
        }

        .section {
            display: none;
            animation: fadeIn .3s ease-out;
        }

        .section.on {
            display: block;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: none;
            }
        }

        .title {
            font-size: 18px;
            font-weight: 900;
            margin: 25px 0 12px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .badge {
            font-size: 10px;
            background: var(--red);
            color: #fff;
            padding: 3px 9px;
            border-radius: 12px;
            font-weight: 900;
        }

        .box {
            background: #fff;
            border-radius: var(--rad);
            padding: 20px;
            margin-bottom: 15px;
            box-shadow: var(--sh);
            border: 1px solid rgba(0, 0, 0, 0.02);
        }

        .box-act {
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
            color: #fff;
            border: none;
        }

        .box-row {
            display: flex;
            align-items: center;
            gap: 12px;
            cursor: pointer;
        }

        .nav {
            position: fixed;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 100%;
            max-width: 440px;
            background: rgba(255, 255, 255, 0.98);
            backdrop-filter: blur(15px);
            border-top: 1px solid #f3f4f6;
            display: flex;
            padding: 12px 0 35px;
            z-index: 500;
        }

        .nav-i {
            flex: 1;
            text-align: center;
            color: var(--sub);
            font-size: 11px;
            font-weight: 800;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            position: relative;
        }

        .nav-i.on {
            color: var(--pri);
        }

        .nav-i .ic {
            font-size: 24px;
        }

        .nav-i .dot {
            position: absolute;
            top: -6px;
            right: 20%;
            background: var(--red);
            color: #fff;
            min-width: 18px;
            height: 18px;
            border-radius: 50%;
            font-size: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 2px solid #fff;
            font-weight: 900;
        }

        #toast {
            position: fixed;
            top: 50px;
            left: 50%;
            transform: translateX(-50%);
            background: #1e293b;
            color: #fff;
            padding: 12px 30px;
            border-radius: 50px;
            font-size: 14px;
            font-weight: 800;
            opacity: 0;
            transition: .3s;
            z-index: 9999;
            pointer-events: none;
        }
    </style>
</head>

<body>

    <div class="shell">
        <!-- 第一步：建立家庭 -->
        <div class="sc-init" id="pgInit">
            <div class="card-init" id="modeStart">
                <div style="font-size:55px;margin-bottom:15px">🏡</div>
                <h1>HomeSync</h1>
                <p>您的家，從這裡開始。<br>資料均經過端對端加密，絕對安全。</p>
                <input class="inp-main" id="iFam" placeholder="家庭名稱（如：我們家）" maxlength="12">
                <button class="btn-main" onclick="initHome()">建立家庭 ✨</button>
            </div>
            <div class="card-init" id="modeJoin" style="display:none">
                <div style="font-size:55px;margin-bottom:15px">✉️</div>
                <h2>收到私密邀請！</h2>
                <p>您即將進入一個私人的家庭空間</p>
                <div id="joinNm" style="font-weight:900; color:var(--pri); font-size:24px; margin:25px 0"></div>
                <button class="btn-main" onclick="joinHome()">點擊加入家庭 →</button>
            </div>
        </div>

        <!-- 第二步：角色選擇 -->
        <div class="sc-role" id="pgRole">
            <h2>是家裡的誰呢？</h2>
            <p>選取頭像進入，或在下方新增自己</p>
            <div class="role-grid" id="roleGrid"></div>
            <div class="add-m-box">
                <p>沒在上面的名單？新增一個：</p>
                <div class="inp-row">
                    <input id="iNewM" placeholder="輸入您的名字" maxlength="6">
                    <button onclick="addM()">新增</button>
                </div>
            </div>
            <button class="btn-main" id="btnGo" disabled onclick="bootApp()">確定是我，進入！ ✨</button>
        </div>

        <!-- 第三步：主 App & 分享 -->
        <div id="sc-app">
            <header class="top">
                <div class="top-row">
                    <h1 id="topNm">HomeSync</h1>
                    <div class="inv-btn" onclick="copyInv()">🔗 分享給家人</div>
                </div>
                <div class="wall" id="wall"></div>
            </header>
            <main class="main" id="view"></main>
            <nav class="nav">
                <div class="nav-i on" onclick="tab('dash')"><span class="ic">🏠</span>首頁</div>
                <div class="nav-i" onclick="tab('task')"><span class="ic">✋</span>託付<div class="dot" id="dotT"
                        style="display:none">0</div>
                </div>
                <div class="nav-i" onclick="tab('buy')"><span class="ic">🛒</span>採買<div class="dot" id="dotB"
                        style="display:none">0</div>
                </div>
                <div class="nav-i" onclick="tab('inv')"><span class="ic">📦</span>庫存</div>
            </nav>
        </div>
    </div>

    <div id="toast"></div>

    <script>
        // ===== 安全引擎 =====
        const CONFIG = { databaseURL: "https://homesync-private-default-rtdb.firebaseio.com" };
        firebase.initializeApp(CONFIG);
        const rdb = firebase.database();

        let famKey = '', famNm = '', meId = '', curTab = 'dash', DB = { m: {}, t: {}, s: {}, v: {} };

        // 1. 初始化
        (function () {
            const p = new URLSearchParams(location.search);
            const invite = p.get('join');
            const saved = localStorage.getItem('hs_k');

            if (invite) {
                famKey = invite;
                document.getElementById('modeStart').style.display = 'none';
                document.getElementById('modeJoin').style.display = 'block';
                rdb.ref('hs/v5/' + famKey + '/name').once('value', s => {
                    document.getElementById('joinNm').textContent = '「' + (s.val() || '家') + '」';
                });
            } else if (saved) {
                famKey = saved;
                connect();
            }
        })();

        function connect() {
            localStorage.setItem('hs_k', famKey);
            // 本地快取保險
            const cache = localStorage.getItem('hs_d_' + famKey);
            if (cache) {
                try {
                    const b = CryptoJS.AES.decrypt(cache, famKey);
                    DB = JSON.parse(b.toString(CryptoJS.enc.Utf8));
                    renderRoles();
                } catch (e) { }
            }

            rdb.ref('hs/v5/' + famKey).on('value', snap => {
                const raw = snap.val();
                if (!raw) return;
                famNm = raw.name || '我家';
                if (raw.data) {
                    try {
                        const b = CryptoJS.AES.decrypt(raw.data, famKey);
                        DB = JSON.parse(b.toString(CryptoJS.enc.Utf8));
                        localStorage.setItem('hs_d_' + famKey, raw.data);
                    } catch (e) { }
                }
                renderRoles();
                if (meId) renderApp();
            });

            document.getElementById('pgInit').classList.add('hide');
            const lMe = localStorage.getItem('hs_me_' + famKey);
            if (lMe) { meId = lMe; bootApp(); }
            else { document.getElementById('pgRole').style.display = 'flex'; }
        }

        function sync() {
            const enc = CryptoJS.AES.encrypt(JSON.stringify(DB), famKey).toString();
            localStorage.setItem('hs_d_' + famKey, enc);
            rdb.ref('hs/v5/' + famKey).update({ name: famNm, data: enc });
        }

        function initHome() {
            const n = document.getElementById('iFam').value.trim(); if (!n) return;
            famNm = n;
            famKey = 'k' + CryptoJS.lib.WordArray.random(12).toString();
            connect();
            sync();
        }
        function joinHome() { connect(); }

        // 2. 角色管理
        function renderRoles() {
            const ms = DB.m || {};
            const roleGrid = document.getElementById('roleGrid');
            roleGrid.innerHTML = Object.keys(ms).map(id => `
    <div class="role-c ${meId == id ? 'on' : ''}" onclick="selMe('${id}')">
      <span class="em">${ms[id].e || '🙋'}</span>
      <div class="nm">${ms[id].n}</div>
    </div>
  `).join('');
        }
        function selMe(id) { meId = id; document.getElementById('btnGo').disabled = false; renderRoles(); }

        // ★ 修正：立刻更新介面，不用等雲端
        function addM() {
            const n = document.getElementById('iNewM').value.trim(); if (!n) return;
            const id = 'm' + Date.now();
            if (!DB.m) DB.m = {};
            DB.m[id] = { n, e: '🙋', s: 'home', note: '' };
            renderRoles(); // 立即渲染！
            sync();
            document.getElementById('iNewM').value = '';
            toast('已新增，點擊頭像即可進入');
        }

        function bootApp() {
            localStorage.setItem('hs_me_' + famKey, meId);
            document.getElementById('pgRole').style.display = 'none';
            document.getElementById('sc-app').style.display = 'flex';
            document.getElementById('topNm').textContent = famNm;
            renderApp();
        }

        // 3. 功能操作
        function tab(t) { curTab = t; renderApp(); }
        function renderApp() {
            renderWall();
            const v = document.getElementById('view');
            if (curTab == 'dash') v.innerHTML = rDash();
            if (curTab == 'task') v.innerHTML = rTask();
            if (curTab == 'buy') v.innerHTML = rBuy();
            if (curTab == 'inv') v.innerHTML = rInv();
            updateDots();
        }

        function renderWall() {
            const ms = DB.m || {};
            document.getElementById('wall').innerHTML = Object.keys(ms).map(id => {
                const m = ms[id];
                return `<div class="ppl-i ${id == meId ? 'me' : ''}">
      <div class="ppl-av">${m.e}</div>
      <div class="ppl-info"><b>${m.n}${id == meId ? ' (我)' : ''}</b><p class="ppl-note">${m.note || '🏡 在家'}</p></div>
    </div>`;
            }).join('');
        }

        function rDash() {
            const ts = DB.t || {}, my = Object.keys(ts).filter(id => ts[id].to == meId && !ts[id].done);
            return `
    <div class="title">今日大事 🎉</div>
    ${my.length ? `<div class="box box-act" onclick="tab('task')"><h3>你有 ${my.length} 項家事指派</h3><p style="font-size:13px;opacity:0.9">點擊查看詳情處理</p></div>` : '<div class="box" style="text-align:center;padding:30px;color:var(--sub)">🏠 一切安好，沒有待辦</div>'}
    <div class="title">快速進入</div>
    <div class="box box-row" onclick="tab('task')"><div style="font-size:30px">✋</div><b>指派任務</b></div>
    <div class="box box-row" onclick="tab('buy')"><div style="font-size:30px">🛒</div><b>採買清單</b></div>`;
        }

        function rTask() {
            const ms = DB.m || {}, ts = DB.t || {};
            const my = Object.keys(ts).filter(id => ts[id].to == meId && !ts[id].done);
            return `<div class="title">指派給家人 ✉️</div>
    <div class="box"><div class="inp-row"><input id="tI" placeholder="如: 幫我領包裹"><button onclick="sendT()">送出</button></div></div>
    <div class="title">我的待辦 <span>${my.length}</span></div>
    ${my.map(id => `<div class="box box-row"><div style="flex:1"><b>${ts[id].tt}</b><p style="font-size:11px;color:var(--sub)">${ms[ts[id].fr].n} 拜託的</p></div><button class="btn-done" style="background:var(--grn);color:#fff;padding:10px 15px;border-radius:12px;font-size:12px;font-weight:900" onclick="taskDone('${id}')">完成</button></div>`).join('') || '<p style="text-align:center;padding:40px;color:var(--sub)">暫無任務</p>'}`;
        }

        function rBuy() {
            const sh = DB.s || {}, pend = Object.keys(sh).filter(i => !sh[i].done);
            return `<div class="title">採買清單 🛒</div>
    <div class="box"><div class="inp-row"><input id="bI" placeholder="想買什麼？"><button onclick="sendB()">加入</button></div></div>
    ${pend.map(id => `<div class="box box-row"><div style="width:30px;height:30px;border:3px solid #eee;border-radius:50%" onclick="buyDone('${id}')"></div><div style="flex:1;font-weight:900">${sh[id].n}</div></div>`).join('') || '<p style="text-align:center;padding:40px;color:var(--sub)">清單已清空</p>'}`;
        }

        function rInv() {
            const iv = DB.v || {}, ids = Object.keys(iv);
            return `<div class="title">物資庫庫存 📦</div>
    <div class="box"><div style="display:flex;gap:8px"><input id="ivN" placeholder="物品" style="flex:2;padding:12px;border:2px solid #eee;border-radius:12px"><input type="number" id="ivQ" value="1" style="flex:1;text-align:center;border:2px solid #eee;border-radius:12px"><button onclick="sendV()" style="padding:0 15px;background:var(--pri);color:#fff;border-radius:12px;font-weight:900">追蹤</button></div></div>
    <div class="iv-grid">${ids.map(id => `<div class="box" style="text-align:center"><b>${iv[id].n}</b><div style="font-size:24px;font-weight:900;margin:10px 0">${iv[id].q}</div><div style="display:flex;justify-content:center;gap:15px"><button onclick="chgV('${id}',-1)" style="width:35px;height:35px;border-radius:50%;border:none">-</button><button onclick="chgV('${id}',1)" style="width:35px;height:35px;border-radius:50%;border:none">+</button></div></div>`).join('')}</div>`;
        }

        // 邏輯
        function sendT() { const v = document.getElementById('tI').value; if (!v) return; if (!DB.t) DB.t = {}; const tid = 't' + Date.now(); let toId = Object.keys(DB.m).find(i => i != meId) || meId; DB.t[tid] = { tt: v, fr: meId, to: toId, done: false }; sync(); renderApp(); toast('已送出！'); }
        function taskDone(id) { DB.t[id].done = true; sync(); renderApp(); toast('太棒了！'); }
        function sendB() { const n = document.getElementById('bI').value; if (!n) return; if (!DB.s) DB.s = {}; DB.s['s' + Date.now()] = { n, by: meId, done: false }; sync(); renderApp(); }
        function buyDone(id) { const item = DB.s[id]; item.done = true; if (!DB.v) DB.v = {}; const ex = Object.keys(DB.v).find(k => DB.v[k].n == item.n); if (ex) DB.v[ex].q += 1; else DB.v['v' + Date.now()] = { n: item.n, q: 1 }; sync(); renderApp(); toast('已入庫！'); }
        function sendV() { const n = document.getElementById('ivN').value, q = parseInt(document.getElementById('ivQ').value); if (!n) return; if (!DB.v) DB.v = {}; DB.v['v' + Date.now()] = { n, q }; sync(); renderApp(); }
        function chgV(id, d) { DB.v[id].q = Math.max(0, DB.v[id].q + d); sync(); renderApp(); }

        function copyInv() {
            const url = window.location.href.split('?')[0] + '?join=' + famKey;
            navigator.clipboard.writeText(url).then(() => toast("🔗 安全邀請連結已複製！傳給家人吧"));
        }
        function updateDots() {
            const ts = DB.t || {}, mys = Object.keys(ts).filter(i => ts[i].to == meId && !ts[i].done).length;
            const dotT = document.getElementById('dotT'); dotT.style.display = mys > 0 ? 'flex' : 'none'; dotT.textContent = mys;
        }
        function toast(m) { const t = document.getElementById('toast'); t.textContent = m; t.style.opacity = 1; setTimeout(() => t.style.opacity = 0, 2500); }
    </script>
</body>

</html>
