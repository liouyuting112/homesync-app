<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>HomeSync 家庭管家 | 終極修復版</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700;900&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>

    <style>
        :root {
            --pri: #7c3aed;
            --priL: #f5f3ff;
            --bg: #f8fafc;
            --w: #fff;
            --txt: #0f172a;
            --sub: #64748b;
            --grn: #10b981;
            --red: #ef4444;
            --rad: 25px;
            --sh: 0 10px 20px rgba(0, 0, 0, 0.1);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'Noto Sans TC', sans-serif;
            background: #eaeef3;
            color: var(--txt);
            display: flex;
            justify-content: center;
            min-height: 100vh;
        }

        /* 核心容器：解決拉伸與跑版 */
        .shell {
            width: 100%;
            max-width: 440px;
            background: var(--bg);
            display: flex;
            flex-direction: column;
            position: relative;
            box-shadow: 0 0 50px rgba(0, 0, 0, 0.1);
            overflow-x: hidden;
        }

        /* 步驟牆 */
        .overlay {
            position: fixed;
            inset: 0;
            z-index: 9999;
            background: #fff;
            display: flex;
            flex-direction: column;
            padding: 50px 25px;
            transition: 0.3s;
            max-width: 440px;
            margin: 0 auto;
        }

        .overlay.hide {
            opacity: 0;
            pointer-events: none;
            transform: translateY(20px);
        }

        .overlay h1 {
            font-size: 32px;
            font-weight: 900;
            color: var(--pri);
            text-align: center;
            margin-bottom: 5px;
        }

        .overlay p {
            color: var(--sub);
            text-align: center;
            font-size: 14px;
            margin-bottom: 30px;
        }

        /* 角色列表渲染區 */
        .role-area {
            flex: 1;
            overflow-y: auto;
            margin: 20px 0;
            padding: 5px;
        }

        .role-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        .role-it {
            background: #f8fafc;
            border: 3px solid #f1f5f9;
            border-radius: 25px;
            padding: 25px 10px;
            text-align: center;
            cursor: pointer;
            transition: 0.2s;
        }

        .role-it.on {
            border-color: var(--pri);
            background: var(--priL);
        }

        .role-it .em {
            font-size: 48px;
            display: block;
            margin-bottom: 8px;
        }

        .role-it b {
            font-size: 16px;
            font-weight: 800;
            display: block;
        }

        /* 新增成員區域：強制不跑版 */
        .add-box {
            background: #f1f5f9;
            padding: 20px;
            border-radius: 25px;
            margin-bottom: 20px;
            text-align: left;
        }

        .add-box label {
            font-size: 11px;
            font-weight: 900;
            color: var(--sub);
            display: block;
            margin-bottom: 8px;
            margin-left: 5px;
        }

        .inp-grp {
            display: flex;
            gap: 10px;
            width: 100%;
        }

        .inp-grp input {
            flex: 1;
            border: none;
            padding: 15px;
            border-radius: 18px;
            font-size: 15px;
            font-weight: 700;
            outline: none;
            box-shadow: inset 0 2px 4px rgba(0, 0, 0, 0.02);
            min-width: 0;
        }

        .inp-grp button {
            background: var(--pri);
            color: #fff;
            border: none;
            border-radius: 18px;
            padding: 0 25px;
            font-weight: 900;
            cursor: pointer;
            white-space: nowrap;
        }

        /* 主按鈕 */
        .btn-go {
            width: 100%;
            padding: 20px;
            border: none;
            background: var(--pri);
            color: #fff;
            border-radius: 100px;
            font-size: 18px;
            font-weight: 900;
            box-shadow: 0 10px 20px rgba(124, 58, 237, 0.3);
            opacity: 0.5;
            cursor: not-allowed;
            transition: 0.3s;
        }

        .btn-go.ready {
            opacity: 1;
            cursor: pointer;
            transform: scale(1.02);
        }

        /* 主介面 */
        #app {
            display: none;
            flex: 1;
            flex-direction: column;
            overflow: hidden;
        }

        .top {
            padding: 30px 20px 15px;
            background: #fff;
            border-bottom: 1px solid #f1f5f9;
        }

        .top-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .top h2 {
            font-weight: 900;
            color: var(--pri);
        }

        .share-btn {
            background: #fef3c7;
            color: #92400e;
            padding: 10px 16px;
            border-radius: 15px;
            font-size: 12px;
            font-weight: 900;
            cursor: pointer;
        }

        .wall {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .ppl {
            display: flex;
            align-items: center;
            gap: 15px;
            padding: 12px 15px;
            background: #f8fafc;
            border-radius: 20px;
        }

        .ppl.me {
            background: var(--priL);
        }

        .av {
            width: 44px;
            height: 44px;
            background: #fff;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            box-shadow: var(--sh);
        }

        /* 底部導航 */
        .nav {
            position: fixed;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 100%;
            max-width: 440px;
            background: rgba(255, 255, 255, 0.98);
            backdrop-filter: blur(15px);
            border-top: 1px solid #f1f5f9;
            display: flex;
            padding: 15px 0 35px;
            z-index: 100;
        }

        .nav-i {
            flex: 1;
            text-align: center;
            color: var(--sub);
            font-size: 11px;
            font-weight: 900;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 5px;
        }

        .nav-i.active {
            color: var(--pri);
        }

        .nav-i .ic {
            font-size: 24px;
        }

        #toast {
            position: fixed;
            bottom: 120px;
            left: 50%;
            transform: translateX(-50%);
            background: #1e293b;
            color: #fff;
            padding: 12px 30px;
            border-radius: 50px;
            font-size: 14px;
            font-weight: 800;
            opacity: 0;
            transition: .3s;
            z-index: 9999;
        }
    </style>
</head>

<body>

    <div class="shell">
        <!-- 步驟一：家庭名稱 -->
        <div class="overlay" id="ov-setup">
            <div style="flex:1; display:flex; flex-direction:column; justify-content:center; align-items:center">
                <div style="font-size:60px; margin-bottom:15px">🏰</div>
                <h1>HomeSync</h1>
                <p>您的家，從這裡開始。<br>隱私已加密，請放心使用。</p>
                <input class="inp-grp" id="i-fam" placeholder="您的家庭名稱 (例如: 我們家)"
                    style="width:100%; border:3px solid #f1f5f9; background:#fff; margin-bottom:20px; text-align:center; padding:20px; border-radius:20px; font-size:18px; outline:none">
                <button class="btn-go ready" onclick="makeHome()">建立家空間 ✨</button>
            </div>
        </div>

        <!-- 步驟二：角色選擇 (針對截圖修正：確保清單同步刷新) -->
        <div class="overlay" id="ov-role" style="display:none">
            <h1>您是誰？</h1>
            <p>請選擇或在下方新增您的身份</p>
            <div class="role-area">
                <div class="role-grid" id="rg-ui"></div>
            </div>
            <div class="add-box">
                <label>沒在清單上？</label>
                <div class="inp-grp">
                    <input id="i-nm" placeholder="輸入您的名字" maxlength="6">
                    <button onclick="addM()">新增</button>
                </div>
            </div>
            <button class="btn-go" id="b-go" onclick="boot()">確定是我，進入！ ✨</button>
        </div>

        <!-- 主 App -->
        <div id="app">
            <header class="top">
                <div class="top-row">
                    <h2 id="top-title">我家</h2>
                    <div class="share-btn" onclick="copy()">🔗 分享與邀請</div>
                </div>
                <div class="wall" id="wall-ui"></div>
            </header>
            <main style="flex:1; padding:20px; overflow-y:auto; text-align:center; color:var(--sub)">
                <div style="margin-top:50px">
                    <div style="font-size:60px">☕️</div>
                    <h3>這是一個私密的空間</h3>
                    <p>點選下方功能開始管理家務</p>
                </div>
            </main>
            <nav class="nav">
                <div class="nav-i active"><span class="ic">🏠</span>首頁</div>
                <div class="nav-i"><span class="ic">✋</span>託付</div>
                <div class="nav-i"><span class="ic">🛒</span>採買</div>
                <div class="nav-i"><span class="ic">📦</span>庫存</div>
            </nav>
        </div>
    </div>

    <div id="toast"></div>

    <script>
        // --- 火力全開的同步引擎 ---
        const dbURL = "https://homesync-private-default-rtdb.firebaseio.com";
        firebase.initializeApp({ databaseURL: dbURL });
        const rdb = firebase.database();

        let fKey = '', fName = '', myId = '', DB = { m: {}, t: {}, s: {}, v: {} };

        // 1. 生命週期
        (function () {
            const p = new URLSearchParams(location.search);
            const join = p.get('join');
            const saved = localStorage.getItem('hs_k_v7');

            if (join) {
                fKey = join;
                document.getElementById('ov-setup').style.display = 'none';
                document.getElementById('ov-role').style.display = 'flex';
                sync();
            } else if (saved) {
                fKey = saved;
                myId = localStorage.getItem('hs_me_' + fKey);
                sync();
                if (myId) boot(); else { document.getElementById('ov-setup').style.display = 'none'; document.getElementById('ov-role').style.display = 'flex'; }
            }
        })();

        function sync() {
            rdb.ref('hs/v7/' + fKey).on('value', snap => {
                const raw = snap.val();
                if (!raw) return;
                fName = raw.n || '我家';
                if (raw.d) {
                    try {
                        const b = CryptoJS.AES.decrypt(raw.d, fKey);
                        DB = JSON.parse(b.toString(CryptoJS.enc.Utf8));
                    } catch (e) { }
                }
                renderRoles();
            });
        }

        function save() {
            const enc = CryptoJS.AES.encrypt(JSON.stringify(DB), fKey).toString();
            rdb.ref('hs/v7/' + fKey).update({ n: fName, d: enc, ts: Date.now() });
        }

        // 2. 步驟功能
        function makeHome() {
            const n = document.getElementById('i-fam').value.trim(); if (!n) return;
            fName = n;
            fKey = 'k' + Math.random().toString(36).substr(2, 10);
            localStorage.setItem('hs_k_v7', fKey);
            save();
            document.getElementById('ov-setup').style.display = 'none';
            document.getElementById('ov-role').style.display = 'flex';
            renderRoles();
        }

        function renderRoles() {
            const grid = document.getElementById('rg-ui');
            const ms = DB.m || {};
            grid.innerHTML = Object.keys(ms).map(id => `
    <div class="role-it ${myId == id ? 'on' : ''}" onclick="sel('${id}')">
      <span class="em">${ms[id].e || '🙋'}</span>
      <b>${ms[id].n}</b>
    </div>
  `).join('');
        }

        function sel(id) {
            myId = id;
            renderRoles();
            const btn = document.getElementById('b-go');
            btn.classList.add('ready');
            btn.disabled = false;
        }

        // ★ 修正重點：點擊新增後，立刻強迫清單重現
        function addM() {
            const n = document.getElementById('i-nm').value.trim();
            if (!n) return;
            const id = 'm' + Date.now();
            if (!DB.m) DB.m = {};
            DB.m[id] = { n, e: '🙋', ts: Date.now() };

            // 1. 立刻同步本地介面
            renderRoles();
            // 2. 後台同步雲端
            save();

            document.getElementById('i-nm').value = '';
            toast('已新增，請點選頭像進入！');
        }

        function boot() {
            if (!myId) return;
            localStorage.setItem('hs_me_' + fKey, myId);
            document.getElementById('ov-setup').style.display = 'none';
            document.getElementById('ov-role').style.display = 'none';
            document.getElementById('app').style.display = 'flex';
            document.getElementById('top-title').textContent = fName;

            // 渲染主牆
            const ms = DB.m || {};
            document.getElementById('wall-ui').innerHTML = Object.keys(ms).map(id => `
    <div class="ppl ${id == myId ? 'me' : ''}">
      <div class="av">${ms[id].e || '🙋'}</div>
      <b style="font-size:16px">${ms[id].n}${id == myId ? ' (我)' : ''}</b>
    </div>
  `).join('');
        }

        function copy() {
            const url = window.location.href.split('?')[0] + '?join=' + fKey;
            navigator.clipboard.writeText(url).then(() => toast('🔗 安全連結已複製！傳給家人吧'));
        }

        function toast(m) { const t = document.getElementById('toast'); t.textContent = m; t.style.opacity = 1; setTimeout(() => t.style.opacity = 0, 2500); }
    </script>
</body>

</html>
