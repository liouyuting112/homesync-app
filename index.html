<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>HomeSync 家庭管家</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700;900&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>

    <style>
        :root {
            --pri: #6366f1;
            --pri-bg: #f5f6ff;
            --bg: #f3f4f6;
            --w: #fff;
            --txt: #111827;
            --sub: #6b7280;
            --grn: #10b981;
            --red: #ef4444;
            --rad: 25px;
            --sh: 0 15px 30px -5px rgba(0, 0, 0, 0.1);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'Noto Sans TC', sans-serif;
            background: #e5e7eb;
            color: var(--txt);
            display: flex;
            justify-content: center;
            min-height: 100vh;
        }

        /* 容器固定寬度，防止跑版 */
        .shell {
            width: 100%;
            max-width: 440px;
            background: #fff;
            display: flex;
            flex-direction: column;
            position: relative;
            min-height: 100vh;
            box-shadow: 0 0 60px rgba(0, 0, 0, 0.1);
            overflow-x: hidden;
        }

        /* 全螢幕引導牆 */
        .onboard {
            position: fixed;
            inset: 0;
            z-index: 9999;
            background: #fff;
            display: flex;
            flex-direction: column;
            padding: 40px 25px;
            max-width: 440px;
            margin: 0 auto;
            transition: 0.4s;
        }

        .onboard.hide {
            opacity: 0;
            pointer-events: none;
            transform: translateY(30px);
        }

        .step {
            flex: 1;
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
        }

        .step.active {
            display: flex;
        }

        .onboard h1 {
            font-size: 34px;
            font-weight: 900;
            color: var(--pri);
            margin-bottom: 8px;
        }

        .onboard p {
            color: var(--sub);
            font-size: 14px;
            margin-bottom: 30px;
            line-height: 1.6;
        }

        /* 輸入與按鈕 */
        .inp-full {
            width: 100%;
            border: 3px solid #f1f5f9;
            background: #f8fafc;
            padding: 20px;
            border-radius: 20px;
            font-size: 18px;
            font-weight: 800;
            text-align: center;
            margin-bottom: 20px;
            outline: none;
        }

        .inp-full:focus {
            border-color: var(--pri);
            background: #fff;
        }

        .btn-p {
            width: 100%;
            padding: 20px;
            border-radius: 100px;
            background: var(--pri);
            color: #fff;
            font-size: 18px;
            font-weight: 900;
            border: none;
            cursor: pointer;
            box-shadow: 0 10px 25px rgba(99, 102, 241, 0.3);
        }

        .btn-p:disabled {
            background: #cbd5e1;
            box-shadow: none;
            cursor: not-allowed;
        }

        /* 身分選擇網格 */
        .role-box {
            width: 100%;
            max-height: 40vh;
            overflow-y: auto;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-bottom: 20px;
            padding: 5px;
        }

        .role-i {
            background: #f8fafc;
            border: 3px solid #f1f5f9;
            border-radius: 22px;
            padding: 25px 10px;
            cursor: pointer;
            transition: 0.2s;
            position: relative;
        }

        .role-i.on {
            border-color: var(--pri);
            background: var(--pri-bg);
        }

        .role-i .em {
            font-size: 44px;
            display: block;
            margin-bottom: 8px;
        }

        .role-i b {
            font-size: 16px;
            font-weight: 900;
        }

        .add-tool {
            background: #f1f5f9;
            padding: 20px;
            border-radius: 25px;
            width: 100%;
            margin-bottom: 20px;
            text-align: left;
        }

        .add-tool label {
            font-size: 11px;
            font-weight: 900;
            color: var(--sub);
            display: block;
            margin-bottom: 10px;
            margin-left: 5px;
        }

        .inp-row {
            display: flex;
            gap: 8px;
        }

        .inp-row input {
            flex: 1;
            border: none;
            padding: 15px;
            border-radius: 15px;
            font-weight: 800;
            outline: none;
        }

        .inp-row button {
            background: var(--pri);
            color: #fff;
            border: none;
            padding: 0 20px;
            border-radius: 15px;
            font-weight: 900;
        }

        /* 主介面 */
        #app {
            display: none;
            flex: 1;
            flex-direction: column;
            overflow: hidden;
        }

        .header {
            padding: 30px 20px 15px;
            background: #fff;
            border-bottom: 1px solid #f1f5f9;
        }

        .header-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .header h2 {
            font-weight: 900;
            color: var(--pri);
            font-size: 24px;
        }

        .invite-chip {
            background: #fef3c7;
            color: #92400e;
            padding: 10px 16px;
            border-radius: 14px;
            font-size: 12px;
            font-weight: 900;
            cursor: pointer;
        }

        .member-wall {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .p-card {
            display: flex;
            align-items: center;
            gap: 15px;
            padding: 15px;
            background: #f9fafb;
            border-radius: 20px;
        }

        .p-card.me {
            background: var(--pri-bg);
            border: 2px solid rgba(99, 102, 241, 0.1);
        }

        .p-av {
            width: 44px;
            height: 44px;
            background: #fff;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            box-shadow: var(--sh);
        }

        .tab-nav {
            position: fixed;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 100%;
            max-width: 440px;
            background: rgba(255, 255, 255, 0.98);
            backdrop-filter: blur(15px);
            border-top: 1px solid #f1f5f9;
            display: flex;
            padding: 15px 0 35px;
            z-index: 500;
        }

        .nav-btn {
            flex: 1;
            text-align: center;
            color: var(--sub);
            font-size: 11px;
            font-weight: 900;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 5px;
        }

        .nav-btn.on {
            color: var(--pri);
        }

        .nav-btn .emoji {
            font-size: 24px;
        }

        #toast {
            position: fixed;
            bottom: 120px;
            left: 50%;
            transform: translateX(-50%);
            background: #1e293b;
            color: #fff;
            padding: 12px 30px;
            border-radius: 50px;
            font-size: 14px;
            font-weight: 800;
            opacity: 0;
            transition: .3s;
            z-index: 9999;
        }
    </style>
</head>

<body>

    <div class="shell">
        <!-- 引導流程牆 -->
        <div class="onboard" id="onboard-wall">
            <!-- 步驟 1: 命名家庭 -->
            <div class="step" id="step-name">
                <div style="font-size:60px">🏰</div>
                <h1>HomeSync</h1>
                <p>首先，為您的家庭空間取個名字</p>
                <input class="inp-full" id="f-name-input" placeholder="家庭名稱（如：我們家）" maxlength="12">
                <button class="btn-p" onclick="gotoIdentity()">下一步 ✨</button>
            </div>

            <!-- 步驟 2: 選分身 -->
            <div class="step" id="step-identity">
                <h1 style="font-size:28px">我是誰？</h1>
                <p>請選擇或新增您的成員身份</p>
                <div class="role-box" id="role-render"></div>
                <div class="add-tool">
                    <label>沒在清單上？</label>
                    <div class="inp-row">
                        <input id="new-m-name" placeholder="您的名字" maxlength="6">
                        <button onclick="addMe()">新增</button>
                    </div>
                </div>
                <button class="btn-p" id="btn-enter" disabled onclick="finalEnter()">確定是我，進入家庭 ✨</button>
            </div>
        </div>

        <!-- 主 App 區 -->
        <div id="app">
            <header class="header">
                <div class="header-top">
                    <h2 id="display-f-name">HomeSync</h2>
                    <div class="invite-chip" onclick="copyShare()">🔗 邀請家人</div>
                </div>
                <div class="member-wall" id="wall-render"></div>
            </header>
            <main style="flex:1; padding:20px; text-align:center; color:var(--sub)">
                <div style="margin-top:60px">
                    <div style="font-size:60px">☕️</div>
                    <h3>私密同步已開啟</h3>
                    <p>點擊下方按鈕開始管理家務</p>
                </div>
            </main>
            <nav class="tab-nav">
                <div class="nav-btn on"><span class="emoji">🏠</span>首頁</div>
                <div class="nav-btn"><span class="emoji">✋</span>託付</div>
                <div class="nav-btn"><span class="emoji">🛒</span>採買</div>
                <div class="nav-btn"><span class="emoji">📦</span>庫存</div>
            </nav>
        </div>
    </div>

    <div id="toast"></div>

    <script>
        // --- 冷酷穩定的雲端引擎 ---
        const dbURL = "https://homesync-private-default-rtdb.firebaseio.com";
        firebase.initializeApp({ databaseURL: dbURL });
        const rdb = firebase.database();

        let fKey = '', fName = '', meId = '', DB = { m: {}, t: {}, s: {}, v: {} };

        // 1. 初始化進入邏輯
        (function init() {
            const p = new URLSearchParams(location.search);
            const invite = p.get('join');
            const savedKey = localStorage.getItem('hs_k_v8');

            if (invite) {
                // 【家人加入流】: 強制進入選分身頁面
                fKey = invite;
                showStep('identity');
                syncCloud();
            } else if (savedKey) {
                // 【老用戶回歸流】
                fKey = savedKey;
                meId = localStorage.getItem('hs_me_' + fKey);
                syncCloud();
                if (meId) {
                    document.getElementById('onboard-wall').classList.add('hide');
                    document.getElementById('app').style.display = 'flex';
                } else {
                    showStep('identity');
                }
            } else {
                // 【新建立者流】: 第一步命名
                showStep('name');
            }
        })();

        function showStep(s) {
            document.querySelectorAll('.step').forEach(div => div.classList.remove('active'));
            document.getElementById('step-' + s).classList.add('active');
        }

        function syncCloud() {
            rdb.ref('hs/v8/' + fKey).on('value', snap => {
                const raw = snap.val();
                if (!raw) return;
                fName = raw.n || '我家';
                if (raw.d) {
                    try {
                        const b = CryptoJS.AES.decrypt(raw.d, fKey);
                        DB = JSON.parse(b.toString(CryptoJS.enc.Utf8));
                    } catch (e) { }
                }
                renderRoles();
                if (meId) renderApp();
            });
        }

        function saveCloud() {
            const enc = CryptoJS.AES.encrypt(JSON.stringify(DB), fKey).toString();
            rdb.ref('hs/v8/' + fKey).update({ n: fName, d: enc, ts: Date.now() });
        }

        // 2. 引導邏輯
        function gotoIdentity() {
            const val = document.getElementById('f-name-input').value.trim();
            if (!val) return;
            fName = val;
            fKey = 'f' + Math.random().toString(36).substr(2, 12);
            localStorage.setItem('hs_k_v8', fKey);
            saveCloud();
            showStep('identity');
            renderRoles();
        }

        function renderRoles() {
            const grid = document.getElementById('role-render');
            const ms = DB.m || {};
            grid.innerHTML = Object.keys(ms).map(id => `
    <div class="role-i ${meId == id ? 'on' : ''}" onclick="selMe('${id}')">
      <span class="em">${ms[id].e || '🙋'}</span>
      <b>${ms[id].n}</b>
    </div>
  `).join('');
        }

        function selMe(id) {
            meId = id;
            renderRoles();
            document.getElementById('btn-enter').disabled = false;
        }

        // 修正：新增成員後立即刷新，不等待雲端
        function addMe() {
            const n = document.getElementById('new-m-name').value.trim();
            if (!n) return;
            const id = 'm' + Date.now();
            if (!DB.m) DB.m = {};
            DB.m[id] = { n, e: '🙋', ts: Date.now() };

            // 立即介面反饋
            renderRoles();
            saveCloud();

            document.getElementById('new-m-name').value = '';
            toast('已新增，請點選頭像進入！');
        }

        function finalEnter() {
            if (!meId) return;
            localStorage.setItem('hs_me_' + fKey, meId);
            document.getElementById('onboard-wall').classList.add('hide');
            document.getElementById('app').style.display = 'flex';
            document.getElementById('display-f-name').textContent = fName;
            renderApp();
        }

        // 3. App 功能
        function renderApp() {
            const ms = DB.m || {};
            document.getElementById('wall-render').innerHTML = Object.keys(ms).map(id => `
    <div class="p-card ${id == meId ? 'me' : ''}">
      <div class="p-av">${ms[id].e || '🙋'}</div>
      <b>${ms[id].n}${id == meId ? ' (我)' : ''}</b>
    </div>
  `).join('');
        }

        function copyShare() {
            const url = window.location.href.split('?')[0] + '?join=' + fKey;
            navigator.clipboard.writeText(url).then(() => toast('🔗 家庭邀請連結已複製！傳給家人吧'));
        }

        function toast(m) { const t = document.getElementById('toast'); t.textContent = m; t.style.opacity = 1; setTimeout(() => t.style.opacity = 0, 2500); }
    </script>
</body>

</html>
