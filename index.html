<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>HomeSync 家庭管家 | 終極連動版</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700;900&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>

    <style>
        :root {
            --pri: #6366f1;
            --pri-bg: #f5f6ff;
            --bg: #f1f5f9;
            --w: #fff;
            --txt: #111827;
            --sub: #6b7280;
            --grn: #10b981;
            --red: #ef4444;
            --rad: 28px;
            --sh: 0 10px 30px -5px rgba(0, 0, 0, 0.1);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'Noto Sans TC', sans-serif;
            background: #e5e7eb;
            color: var(--txt);
            display: flex;
            justify-content: center;
            min-height: 100vh;
        }

        .shell {
            width: 100%;
            max-width: 440px;
            background: #fff;
            display: flex;
            flex-direction: column;
            position: relative;
            min-height: 100vh;
            box-shadow: 0 0 50px rgba(0, 0, 0, 0.1);
        }

        /* 全螢幕遮罩層 */
        .overlay {
            position: fixed;
            inset: 0;
            z-index: 9999;
            background: #fff;
            display: flex;
            flex-direction: column;
            padding: 40px 25px;
            transition: 0.4s;
            max-width: 440px;
            margin: 0 auto;
        }

        .overlay.hide {
            opacity: 0;
            pointer-events: none;
            transform: translateY(30px);
        }

        .step {
            flex: 1;
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
        }

        .step.on {
            display: flex;
        }

        .overlay h1 {
            font-size: 34px;
            font-weight: 900;
            color: var(--pri);
            margin-bottom: 8px;
        }

        .overlay p {
            color: var(--sub);
            font-size: 15px;
            margin-bottom: 30px;
            line-height: 1.6;
        }

        .inp-x {
            width: 100%;
            border: 3px solid #f1f5f9;
            background: #f8fafc;
            padding: 20px;
            border-radius: 22px;
            font-size: 18px;
            font-weight: 800;
            text-align: center;
            margin-bottom: 20px;
            outline: none;
            transition: 0.2s;
        }

        .inp-x:focus {
            border-color: var(--pri);
            background: #fff;
        }

        .btn-x {
            width: 100%;
            padding: 20px;
            border-radius: 100px;
            background: var(--pri);
            color: #fff;
            font-size: 18px;
            font-weight: 900;
            border: none;
            cursor: pointer;
            box-shadow: 0 12px 25px rgba(99, 102, 241, 0.3);
        }

        /* 角色網格 */
        .role-grid {
            width: 100%;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 25px;
            max-height: 35vh;
            overflow-y: auto;
            padding: 5px;
        }

        .role-i {
            background: #f8fafc;
            border: 3px solid #f1f5f9;
            border-radius: 25px;
            padding: 20px 10px;
            cursor: pointer;
            text-align: center;
            transition: 0.2s;
        }

        .role-i.on {
            border-color: var(--pri);
            background: var(--pri-bg);
            transform: scale(1.03);
        }

        .role-i .em {
            font-size: 40px;
            display: block;
            margin-bottom: 5px;
        }

        .role-i b {
            font-size: 15px;
            font-weight: 900;
        }

        .input-box {
            background: #f1f5f9;
            padding: 20px;
            border-radius: 25px;
            width: 100%;
            margin-bottom: 20px;
        }

        .inp-row {
            display: flex;
            gap: 10px;
        }

        .inp-row input {
            flex: 1;
            border: none;
            padding: 15px;
            border-radius: 15px;
            font-weight: 800;
            outline: none;
        }

        .inp-row button {
            background: var(--pri);
            color: #fff;
            border: none;
            padding: 0 20px;
            border-radius: 15px;
            font-weight: 900;
        }

        /* 主 App */
        #app {
            display: none;
            flex: 1;
            flex-direction: column;
        }

        .top {
            padding: 30px 20px 20px;
            background: #fff;
            border-bottom: 1px solid #f1f5f9;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .top-row {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 20px;
        }

        .top h2 {
            font-weight: 900;
            color: var(--pri);
            font-size: 26px;
        }

        .sync-tag {
            font-size: 10px;
            color: var(--grn);
            background: #d1fae5;
            padding: 4px 10px;
            border-radius: 100px;
            font-weight: 900;
            display: inline-flex;
            align-items: center;
            gap: 4px;
            margin-top: 5px;
        }

        .share-btn {
            background: #fcd34d;
            color: #92400e;
            padding: 10px 18px;
            border-radius: 15px;
            font-size: 13px;
            font-weight: 900;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(252, 211, 77, 0.3);
        }

        .ppl-wall {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .ppl-i {
            display: flex;
            align-items: center;
            gap: 15px;
            padding: 15px 20px;
            background: #f8fafc;
            border-radius: 22px;
            transition: 0.3s;
        }

        .ppl-i.me {
            background: var(--pri-bg);
            border-left: 6px solid var(--pri);
        }

        .ppl-av {
            width: 48px;
            height: 48px;
            background: #fff;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 26px;
            box-shadow: var(--sh);
        }

        .main {
            flex: 1;
            padding: 30px 20px 140px;
            text-align: center;
        }

        .nav {
            position: fixed;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 100%;
            max-width: 440px;
            background: rgba(255, 255, 255, 0.98);
            backdrop-filter: blur(15px);
            border-top: 1px solid #f1f5f9;
            display: flex;
            padding: 15px 0 35px;
            z-index: 500;
        }

        .nav-i {
            flex: 1;
            text-align: center;
            color: var(--sub);
            font-size: 11px;
            font-weight: 900;
        }

        .nav-i.active {
            color: var(--pri);
        }

        .nav-i .ic {
            font-size: 26px;
            display: block;
            margin-bottom: 4px;
        }

        #toast {
            position: fixed;
            bottom: 120px;
            left: 50%;
            transform: translateX(-50%);
            background: #1e293b;
            color: #fff;
            padding: 12px 30px;
            border-radius: 50px;
            font-size: 14px;
            font-weight: 800;
            opacity: 0;
            transition: .3s;
            z-index: 9999;
        }
    </style>
</head>

<body>

    <div class="shell">
        <!-- 引導流程 -->
        <div class="overlay" id="ov">
            <div class="step" id="st-n">
                <div style="font-size:65px; margin-bottom:15px">🏰</div>
                <h1>建立家庭</h1>
                <p>歡迎使用 HomeSync！<br>請先為您的家庭空間取個名字。</p>
                <input class="inp-x" id="in-f-n" placeholder="例如：亮亮家、幸福之家" maxlength="12">
                <button class="btn-x" onclick="goStep2()">開始建立 ✨</button>
            </div>

            <div class="step" id="st-r">
                <h1 id="r-title">我是誰？</h1>
                <p>請建立或選擇您的身分，開始實時連動。</p>
                <div class="role-grid" id="rg-render"></div>
                <div class="input-box">
                    <div class="inp-row">
                        <input id="in-m-n" placeholder="輸入您的名字" maxlength="6">
                        <button onclick="addM()">新增</button>
                    </div>
                </div>
                <button class="btn-x" id="btn-go" disabled onclick="bootApp()">確定是我，進入！ ✨</button>
            </div>
        </div>

        <!-- 主 App -->
        <div id="app">
            <header class="top">
                <div class="top-row">
                    <div>
                        <h2 id="top-f-n">HomeSync</h2>
                        <div class="sync-tag">● 安全同步中</div>
                    </div>
                    <div class="share-btn" onclick="copyLink()">🔗 分享與連動</div>
                </div>
                <div class="ppl-wall" id="ppl-render"></div>
            </header>
            <main class="main">
                <div style="margin-top:60px">
                    <div style="font-size:70px">💡</div>
                    <h3 style="margin-top:20px">已與家人即時連動</h3>
                    <p style="font-size:14px; color:var(--sub); margin-top:10px">您與家人的任何變動，雙方都會同步看見。</p>
                </div>
            </main>
            <nav class="nav">
                <div class="nav-i active"><span class="ic">🏠</span>首頁</div>
                <div class="nav-i"><span class="ic">✋</span>託付</div>
                <div class="nav-i"><span class="ic">🛒</span>採買</div>
                <div class="nav-i"><span class="ic">📦</span>庫存</div>
            </nav>
        </div>
    </div>

    <div id="toast"></div>

    <script>
        // --- 絕對同步引擎 (V11) ---
        const dbURL = "https://homesync-private-default-rtdb.firebaseio.com";
        firebase.initializeApp({ databaseURL: dbURL });
        const rdb = firebase.database();

        let famK = '', famN = '', meId = '', memberData = {};

        (function init() {
            const p = new URLSearchParams(location.search);
            const joinCode = p.get('join');
            const savedK = localStorage.getItem('hs_k_v11');

            if (joinCode) {
                // 【家人模式】：直接同步對方的家
                famK = joinCode;
                localStorage.setItem('hs_k_v11', joinCode);
                startSync();
            } else if (savedK) {
                // 【老用戶模式】
                famK = savedK;
                meId = localStorage.getItem('hs_me_' + famK);
                startSync();
                if (meId) {
                    document.getElementById('ov').classList.add('hide');
                    document.getElementById('app').style.display = 'flex';
                }
            } else {
                // 【新屋主模式】
                showStep('n');
            }
        })();

        function showStep(s) {
            document.querySelectorAll('.step').forEach(d => d.classList.remove('on'));
            document.getElementById('st-' + s).classList.add('on');
        }

        function startSync() {
            // 1. 同步家名
            rdb.ref(`hs/v11/${famK}/name`).on('value', s => {
                famN = s.val() || '我們的家';
                document.getElementById('top-f-n').textContent = famN;
                document.getElementById('r-title').textContent = famN + " 是誰？";
            });

            // 2. 同步成員 (重點：修正 V10 的變數衝突)
            rdb.ref(`hs/v11/${famK}/m`).on('value', snap => {
                const data = snap.val() || {};
                memberData = {}; // 清空並更新
                Object.keys(data).forEach(id => {
                    try {
                        const bytes = CryptoJS.AES.decrypt(data[id], famK);
                        memberData[id] = JSON.parse(bytes.toString(CryptoJS.enc.Utf8));
                    } catch (e) { }
                });
                renderAllUI();
            });
            showStep('r');
        }

        function goStep2() {
            const n = document.getElementById('in-f-n').value.trim();
            if (!n) return;
            famN = n;
            famK = 'H' + Math.random().toString(36).substr(2, 9);
            localStorage.setItem('hs_k_v11', famK);
            rdb.ref(`hs/v11/${famK}/name`).set(famN);
            startSync();
        }

        function renderAllUI() {
            // 渲染選擇清單
            const grid = document.getElementById('rg-render');
            grid.innerHTML = Object.keys(memberData).map(id => `
        <div class="role-i ${meId == id ? 'on' : ''}" onclick="setMe('${id}')">
            <span class="em">${memberData[id].e || '🙋'}</span>
            <b>${memberData[id].n}</b>
        </div>
    `).join('');

            // 渲染主 App 成員牆
            const wall = document.getElementById('ppl-render');
            if (meId && wall) {
                wall.innerHTML = Object.keys(memberData).map(id => `
            <div class="ppl-i ${id == meId ? 'me' : ''}">
                <div class="ppl-av">${memberData[id].e || '🙋'}</div>
                <b>${memberData[id].n}${id == meId ? ' (我)' : ''}</b>
            </div>
        `).join('');
            }
        }

        function setMe(id) {
            meId = id;
            renderAllUI();
            document.getElementById('btn-go').disabled = false;
        }

        function addM() {
            const n = document.getElementById('in-m-n').value.trim();
            if (!n) return;
            const mid = 'M' + Date.now();
            const mObj = { n, e: '🙋', ts: Date.now() };
            const enc = CryptoJS.AES.encrypt(JSON.stringify(mObj), famK).toString();

            // 分項寫入，絕不覆蓋別人
            rdb.ref(`hs/v11/${famK}/m/${mid}`).set(enc);
            document.getElementById('in-m-n').value = '';
            toast('新增成功！請選取您的名字進入');
        }

        function bootApp() {
            if (!meId) return;
            localStorage.setItem('hs_me_' + famK, meId);
            document.getElementById('ov').classList.add('hide');
            document.getElementById('app').style.display = 'flex';
            renderAllUI();
        }

        function copyLink() {
            const url = window.location.href.split('?')[0] + '?join=' + famK;
            navigator.clipboard.writeText(url).then(() => toast('🔗 連動連結已複製！傳給家人吧'));
        }

        function toast(m) { const t = document.getElementById('toast'); t.textContent = m; t.style.opacity = 1; setTimeout(() => t.style.opacity = 0, 2500); }
    </script>
</body>

</html>
