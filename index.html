<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self' https: 'unsafe-inline' 'unsafe-eval';">
    <title>HomeSync | 安全加密家庭管家</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap"
        rel="stylesheet">
    <!-- 頂級資安防禦庫 -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>

    <style>
        :root {
            --pri: #6d28d9;
            --priL: #f5f3ff;
            --bg: #f8fafc;
            --w: #ffffff;
            --txt: #0f172a;
            --sub: #64748b;
            --grn: #059669;
            --org: #d97706;
            --red: #dc2626;
            --rad: 20px;
            --sh: 0 10px 15px -3px rgba(0, 0, 0, 0.06);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'Noto Sans TC', sans-serif;
            background: var(--bg);
            color: var(--txt);
            min-height: 100vh;
        }

        .shell {
            max-width: 440px;
            margin: 0 auto;
            min-height: 100vh;
            background: var(--w);
            display: flex;
            flex-direction: column;
            position: relative;
            box-shadow: 0 0 40px rgba(0, 0, 0, 0.05);
        }

        /* 安全登入/邀請頁 */
        .sc-init {
            position: fixed;
            inset: 0;
            z-index: 9000;
            background: linear-gradient(135deg, #6d28d9 0%, #7c3aed 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 30px;
        }

        .sc-init.off {
            display: none;
        }

        .card-init {
            background: #fff;
            width: 100%;
            border-radius: 35px;
            padding: 45px 30px;
            text-align: center;
            box-shadow: 0 25px 60px rgba(0, 0, 0, 0.3);
        }

        .card-init h2 {
            font-weight: 900;
            font-size: 28px;
            color: var(--pri);
            margin-bottom: 8px;
        }

        .card-init p {
            font-size: 13px;
            color: var(--sub);
            line-height: 1.6;
            margin-bottom: 30px;
        }

        .inp-init {
            width: 100%;
            border: 3px solid #f1f5f9;
            background: #f8fafc;
            padding: 18px;
            border-radius: 20px;
            font-size: 16px;
            font-weight: 900;
            text-align: center;
            margin-bottom: 15px;
            outline: none;
        }

        .inp-init:focus {
            border-color: var(--pri);
            background: #fff;
        }

        .btn-pri {
            width: 100%;
            padding: 18px;
            border: none;
            border-radius: 100px;
            font-size: 17px;
            font-weight: 900;
            color: #fff;
            background: var(--pri);
            cursor: pointer;
            box-shadow: 0 10px 25px rgba(109, 40, 217, 0.3);
            transition: 0.2s;
        }

        .btn-pri:active {
            transform: scale(0.96);
        }

        /* 加密安全通知 */
        .sec-indicator {
            font-size: 10px;
            font-weight: 900;
            color: #059669;
            background: #d1fae5;
            padding: 4px 12px;
            border-radius: 8px;
            display: inline-flex;
            align-items: center;
            gap: 4px;
            margin-bottom: 15px;
        }

        /* 角色頁 */
        .sc-role {
            position: fixed;
            inset: 0;
            z-index: 8000;
            background: #fff;
            padding: 40px 20px;
            display: none;
            flex-direction: column;
        }

        .role-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin: 25px 0;
        }

        .role-c {
            background: var(--bg);
            border: 3.5px solid transparent;
            border-radius: 25px;
            padding: 30px 10px;
            text-align: center;
            cursor: pointer;
            transition: .2s;
        }

        .role-c.on {
            border-color: var(--pri);
            background: var(--priL);
        }

        .role-c .em {
            font-size: 45px;
            display: block;
            margin-bottom: 8px;
        }

        .role-c .nm {
            font-size: 16px;
            font-weight: 900;
        }

        /* 主介面 */
        #sc-app {
            display: none;
            flex: 1;
            flex-direction: column;
            overflow: hidden;
        }

        .top {
            padding: 25px 20px 15px;
            background: #fff;
            border-bottom: 1px solid #f1f5f9;
        }

        .top-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .top-row h1 {
            font-size: 24px;
            font-weight: 900;
            color: var(--pri);
            letter-spacing: -1px;
        }

        .inv-chip {
            font-size: 11px;
            font-weight: 900;
            color: #92400e;
            background: #fef3c7;
            padding: 8px 15px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            gap: 5px;
            cursor: pointer;
        }

        /* 成員狀態 */
        .ppl-bar {
            display: flex;
            flex-direction: column;
            gap: 10px;
            padding-bottom: 15px;
        }

        .ppl-item {
            display: flex;
            align-items: center;
            gap: 15px;
            padding: 15px;
            background: var(--bg);
            border-radius: 20px;
        }

        .ppl-item.me {
            background: var(--priL);
            box-shadow: inset 0 0 0 2px rgba(109, 40, 217, 0.05);
        }

        .ppl-av {
            width: 46px;
            height: 46px;
            background: #fff;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            box-shadow: var(--sh);
        }

        .ppl-info {
            flex: 1;
        }

        .ppl-info b {
            font-size: 16px;
            font-weight: 900;
            display: block;
            margin-bottom: 2px;
        }

        .ppl-note {
            font-size: 12px;
            color: var(--sub);
        }

        .ppl-st {
            font-size: 11px;
            font-weight: 900;
            padding: 5px 12px;
            border-radius: 12px;
            white-space: nowrap;
        }

        /* 通用列表式設計 */
        .main {
            flex: 1;
            overflow-y: auto;
            padding: 0 20px 130px;
        }

        .section {
            display: none;
            animation: fadeIn .3s ease-out;
        }

        .section.on {
            display: block;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: none;
            }
        }

        .title {
            font-size: 19px;
            font-weight: 900;
            margin: 30px 0 15px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .badge {
            font-size: 10px;
            background: var(--red);
            color: #fff;
            padding: 2px 8px;
            border-radius: 10px;
            font-weight: 900;
        }

        .box {
            background: #fff;
            border-radius: var(--rad);
            padding: 20px;
            margin-bottom: 15px;
            box-shadow: var(--sh);
            border: 1px solid rgba(0, 0, 0, 0.02);
        }

        .box-act {
            background: linear-gradient(135deg, #6d28d9, #8b5cf6);
            color: #fff;
            border: none;
        }

        .box-row {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        /* 輸入與回覆 */
        .inp-row {
            display: flex;
            gap: 10px;
            background: #f1f5f9;
            padding: 6px;
            border-radius: 20px;
            margin-bottom: 15px;
        }

        .inp-row input {
            flex: 1;
            border: none;
            background: transparent;
            padding: 14px;
            font-size: 16px;
            font-weight: 700;
            outline: none;
        }

        .inp-row button {
            background: var(--pri);
            color: #fff;
            border-radius: 15px;
            padding: 0 22px;
            font-weight: 900;
            font-size: 15px;
        }

        /* 任務卡 */
        .tk-reply {
            margin-top: 12px;
            padding: 12px;
            background: #f9fafb;
            border-radius: 15px;
            border-left: 4px solid var(--org);
            font-size: 13px;
            color: var(--sub);
        }

        .btn-done {
            background: var(--grn);
            color: #fff;
            padding: 12px 20px;
            border-radius: 15px;
            font-weight: 900;
            font-size: 13px;
            white-space: nowrap;
        }

        /* 庫存功能 */
        .iv-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        .iv-card {
            background: #fff;
            border-radius: var(--rad);
            padding: 20px;
            text-align: center;
            box-shadow: var(--sh);
            border: 2.5px solid transparent;
            cursor: pointer;
        }

        .iv-card.low {
            border-color: var(--org);
            background: #fffbeb;
        }

        .iv-card.zero {
            border-color: var(--red);
            background: #fef2f2;
        }

        .iv-name {
            font-size: 15px;
            font-weight: 900;
            margin-bottom: 10px;
        }

        .iv-qty {
            font-size: 26px;
            font-weight: 900;
            margin: 8px 0;
        }

        .iv-btn {
            width: 100%;
            border: none;
            background: var(--org);
            color: #fff;
            padding: 10px;
            border-radius: 12px;
            font-weight: 900;
            font-size: 11px;
            margin-top: 10px;
        }

        /* 底部功能 */
        .nav {
            position: fixed;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 100%;
            max-width: 440px;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(15px);
            border-top: 1px solid #f1f5f9;
            display: flex;
            padding: 12px 0 35px;
            z-index: 500;
        }

        .nav-i {
            flex: 1;
            text-align: center;
            color: var(--sub);
            font-size: 11px;
            font-weight: 800;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            position: relative;
        }

        .nav-i.on {
            color: var(--pri);
        }

        .nav-i .ic {
            font-size: 24px;
        }

        .nav-i .dot {
            position: absolute;
            top: -6px;
            right: 20%;
            background: var(--red);
            color: #fff;
            min-width: 18px;
            height: 18px;
            border-radius: 10px;
            font-size: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 2px solid #fff;
        }

        #toast {
            position: fixed;
            top: 50px;
            left: 50%;
            transform: translateX(-50%);
            background: #1e293b;
            color: #fff;
            padding: 12px 30px;
            border-radius: 50px;
            font-size: 14px;
            font-weight: 800;
            opacity: 0;
            transition: .3s;
            z-index: 9999;
            pointer-events: none;
        }
    </style>
</head>

<body>

    <div class="shell">
        <!-- 建立 / 加入 -->
        <div class="sc-init" id="pgInit">
            <div class="card-init" id="modeCreate">
                <div class="sec-indicator">🛡️ 高強度端對端加密已開啟</div>
                <h2>HomeSync</h2>
                <p>您的私人家庭空間。<br>資料經過軍事級加密，駭客無法讀取內容。</p>
                <input class="inp-init" id="iName" placeholder="輸入家名 (如: 我家)" maxlength="12">
                <button class="btn-pri" onclick="buildHome()">建立我的安全家庭空間 ✨</button>
            </div>
            <div class="card-init" id="modeJoin" style="display:none">
                <div class="sec-indicator">🔐 您收到安全邀請</div>
                <h2>進入家庭</h2>
                <p>點擊下方按鈕以進入您的私密空間</p>
                <div id="joinWho" style="font-weight:900; color:var(--pri); font-size:22px; margin:20px 0"></div>
                <button class="btn-pri" onclick="verifyJoin()">立即點擊進入 →</button>
            </div>
        </div>

        <!-- 角色選擇 -->
        <div class="sc-role" id="pgRole">
            <h2 style="font-weight:900">你是家裡的誰？</h2>
            <div class="role-grid" id="roleGrid"></div>
            <div style="background:#f1f5f9; padding:25px; border-radius:25px">
                <p style="font-size:12px; font-weight:900; color:var(--sub); margin-bottom:12px">沒在名單上？新增一名成員：</p>
                <div style="display:flex; gap:10px">
                    <input id="newMemberName" placeholder="輸入名字"
                        style="flex:1; border:none; padding:15px; border-radius:15px; font-weight:800">
                    <button onclick="addNewM()"
                        style="background:var(--pri); color:#fff; border:none; padding:0 25px; border-radius:15px; font-weight:900">新增</button>
                </div>
            </div>
            <button class="btn-pri" id="btnStart" disabled onclick="bootApp()" style="margin-top:auto">安全連線進入 ✨</button>
        </div>

        <!-- 主App -->
        <div id="sc-app">
            <header class="top">
                <div class="top-row">
                    <h1 id="topName">家</h1>
                    <div class="inv-chip" onclick="copyInvite()"><span>🔗</span>邀請家人</div>
                </div>
                <div class="ppl-bar" id="wall"></div>
            </header>
            <main class="main" id="view"></main>
            <nav class="nav">
                <div class="nav-i on" onclick="tab('dash')"><span class="ic">🏠</span>首頁</div>
                <div class="nav-i" onclick="tab('task')"><span class="ic">✋</span>託付<div class="dot" id="dotT"
                        style="display:none">0</div>
                </div>
                <div class="nav-i" onclick="tab('buy')"><span class="ic">🛒</span>採買<div class="dot" id="dotB"
                        style="display:none">0</div>
                </div>
                <div class="nav-i" onclick="tab('inv')"><span class="ic">📦</span>庫存</div>
            </nav>
        </div>
    </div>

    <!-- 狀態留言抽屜 -->
    <div id="stDrawer" class="sc-init off" style="background:rgba(0,0,0,0.5); align-items:flex-end">
        <div class="card-init" style="width:100%; border-radius:35px 35px 0 0; padding-bottom:100px">
            <h3 style="margin-bottom:20px">更新目前狀態</h3>
            <textarea id="stNote"
                style="width:100%; height:100px; padding:15px; border-radius:20px; border:3px solid #f1f5f9; font-weight:800"
                placeholder="例如：帶狗散步、正在加班、回家的路上..."></textarea>
            <button class="btn-pri" style="margin-top:15px" onclick="saveSt()">儲存狀態</button>
            <button onclick="document.getElementById('stDrawer').classList.add('off')"
                style="width:100%; margin-top:15px; background:none; border:none; font-weight:900; color:var(--sub)">取消</button>
        </div>
    </div>

    <div id="toast"></div>

    <script>
        // ===== 資安防禦架構 =====
        const CONFIG = { databaseURL: "https://homesync-private-default-rtdb.firebaseio.com" };
        firebase.initializeApp(CONFIG);
        const rdb = firebase.database();

        let familyKey = '', familyName = '', meId = '', tabName = 'dash', DB = { m: {}, t: {}, s: {}, v: {} };

        // 1. 初始化與金鑰辨識
        (function init() {
            const params = new URLSearchParams(location.search);
            const invite = params.get('join');
            const saved = localStorage.getItem('hs_key');

            if (invite) {
                familyKey = invite;
                document.getElementById('modeCreate').style.display = 'none';
                document.getElementById('modeJoin').style.display = 'block';
                // 預讀名稱（這部分不加密，僅供辨識）
                rdb.ref('hs/v4/' + familyKey + '/name').once('value', s => {
                    document.getElementById('joinWho').textContent = '「' + (s.val() || '家') + '」';
                });
            } else if (saved) {
                familyKey = saved;
                connectCloud();
            }
        })();

        function connectCloud() {
            localStorage.setItem('hs_key', familyKey);
            rdb.ref('hs/v4/' + familyKey).on('value', snap => {
                const raw = snap.val();
                if (!raw) return;
                familyName = raw.name || '我家';
                // --- 軍事級解密流程 ---
                if (raw.data) {
                    try {
                        const bytes = CryptoJS.AES.decrypt(raw.data, familyKey);
                        DB = JSON.parse(bytes.toString(CryptoJS.enc.Utf8));
                    } catch (e) { console.error("解密失敗，金鑰可能不對"); }
                }
                renderRoles();
                if (meId) renderApp();
            });
            document.getElementById('pgInit').classList.add('off');
            const savedMe = localStorage.getItem('hs_me_' + familyKey);
            if (savedMe) { meId = savedMe; bootApp(); }
            else { document.getElementById('pgRole').style.display = 'flex'; }
        }

        // 2. 雲端加密同步
        function syncToCloud() {
            // --- 軍事級加密流程 ---
            const encrypted = CryptoJS.AES.encrypt(JSON.stringify(DB), familyKey).toString();
            rdb.ref('hs/v4/' + familyKey).update({
                name: familyName,
                data: encrypted,
                lastUpdate: Date.now()
            });
        }

        function buildHome() {
            const n = document.getElementById('iName').value.trim(); if (!n) return;
            familyName = n;
            familyKey = 'k' + CryptoJS.lib.WordArray.random(16).toString();
            syncToCloud();
            connectCloud();
        }

        function verifyJoin() { connectCloud(); }

        // 3. 角色與主介面
        function renderRoles() {
            const list = document.getElementById('roleGrid');
            const ms = DB.m || {};
            list.innerHTML = Object.keys(ms).map(id => `
    <div class="role-c ${meId == id ? 'on' : ''}" onclick="selMe('${id}')">
      <span class="em">${ms[id].e || '🙋'}</span>
      <div class="nm">${ms[id].n}</div>
    </div>
  `).join('');
        }
        function selMe(id) { meId = id; document.getElementById('btnStart').disabled = false; renderRoles(); }
        function addNewM() {
            const n = document.getElementById('newMemberName').value.trim(); if (!n) return;
            const id = 'm' + Date.now();
            if (!DB.m) DB.m = {};
            DB.m[id] = { n, e: '🙋', s: 'home', note: '' };
            syncToCloud();
            document.getElementById('newMemberName').value = '';
        }
        function bootApp() {
            localStorage.setItem('hs_me_' + familyKey, meId);
            document.getElementById('pgRole').style.display = 'none';
            document.getElementById('sc-app').style.display = 'flex';
            document.getElementById('topName').textContent = familyName;
            renderApp();
        }

        // 4. 功能面板
        function tab(t) {
            tabName = t;
            document.querySelectorAll('.nav-i').forEach((it, i) => it.classList.toggle('on', [['dash', 'task', 'buy', 'inv'][i]].includes(t)));
            renderApp();
        }

        function renderApp() {
            renderWall();
            const v = document.getElementById('view');
            if (tabName == 'dash') v.innerHTML = rDash();
            if (tabName == 'task') v.innerHTML = rTask();
            if (tabName == 'buy') v.innerHTML = rBuy();
            if (tabName == 'inv') v.innerHTML = rInv();
            updateBadges();
        }

        function renderWall() {
            const ms = DB.m || {};
            document.getElementById('wall').innerHTML = Object.keys(ms).map(id => {
                const m = ms[id];
                return `<div class="ppl-item ${id == meId ? 'me' : ''}" onclick="${id == meId ? 'openSt()' : ''}">
      <div class="ppl-av">${m.e}</div>
      <div class="ppl-info"><b>${m.n}${id == meId ? ' (我)' : ''}</b><p class="ppl-note">${m.note || '🏡 在家'}</p></div>
    </div>`;
            }).join('');
        }

        function rDash() {
            const ts = DB.t || {};
            const my = Object.keys(ts).filter(i => ts[i].to == meId && !ts[i].done);
            return `
    <div class="title">今日大事 🎉</div>
    ${my.length ? `
      <div class="box box-act" onclick="tab('task')">
        <h3 style="margin-bottom:5px">嘿！你有 ${my.length} 項指派任務</h3>
        <p style="font-size:14px; opacity:0.85">趕快查看家人拜託你的事</p>
      </div>` : `<div class="box" style="text-align:center; padding:40px; color:var(--sub)">🏠 目前沒什麼要緊事</div>`}
    
    <div class="title">快速傳送 🚀</div>
    <div class="box box-row" onclick="tab('task')"><div style="font-size:30px">✋</div><b>指派託付事項</b></div>
    <div class="box box-row" onclick="tab('buy')"><div style="font-size:30px">🛒</div><b>查看採買清單</b></div>`;
        }

        function rTask() {
            const ms = DB.m || {}, ts = DB.t || {};
            const my = Object.keys(ts).filter(i => ts[i].to == meId && !ts[i].done);
            return `
    <div class="title">指派託付 ✉️</div>
    <div class="box">
      <div class="inp-row"><input id="tIn" placeholder="例如: 幫我帶麵、拿包裹..."><button onclick="sendT()">送出</button></div>
      <div style="font-size:11px; font-weight:900; color:var(--sub); margin-bottom:10px">指派給：</div>
      <div style="display:flex; gap:10px; overflow-x:auto">
        ${Object.keys(ms).map(id => `<div class="ppl-st ${id != meId ? 'st-way' : 'st-home'}" style="cursor:pointer" onclick="sendT('${id}')">${ms[id].n}</div>`).join('')}
      </div>
    </div>
    <div class="title">👉 我要做的 <span>${my.length}</span></div>
    ${my.map(id => `
      <div class="box" style="border-left:5px solid var(--pri)">
        <div style="display:flex; justify-content:space-between; align-items:flex-start">
          <div><b style="font-size:17px">${DB.t[id].tt}</b><p style="font-size:11px; color:var(--sub); margin-top:5px">由 ${ms[ts[id].fr].n} 託付</p></div>
          <button class="btn-done" onclick="taskDone('${id}')">✓ 完成</button>
        </div>
      </div>`).join('') || '<p style="text-align:center; color:var(--sub); padding:30px">完美！目前已無待辦事項</p>'}`;
        }

        function rBuy() {
            const sh = DB.s || {}, ms = DB.m || {};
            const pend = Object.keys(sh).filter(i => !sh[i].done);
            return `
    <div class="title">採買清單 🛒</div>
    <div class="box"><div class="inp-row"><input id="bIn" placeholder="新增採買項目"><button onclick="sendB()">加入</button></div></div>
    ${pend.map(id => `
      <div class="box box-row">
        <div style="width:34px; height:34px; border-radius:50%; border:3px solid #eee; cursor:pointer; display:flex; align-items:center; justify-content:center" onclick="buyDone('${id}')"></div>
        <div style="flex:1 font-weight:900; font-size:16px">${sh[id].n}</div>
        <div style="font-size:10px; color:var(--sub)">${ms[sh[id].by].n} 新增</div>
      </div>`).join('') || '<p style="text-align:center; color:var(--sub); padding:30px">清單空空，真清爽！</p>'}`;
        }

        function rInv() {
            const iv = DB.v || {}, ids = Object.keys(iv);
            return `
    <div class="title">物資庫存 📦</div>
    <div class="box"><div style="display:flex; gap:8px"><input id="ivN" placeholder="物品" style="flex:2; padding:12px; border:2px solid #eee; border-radius:12px"><input type="number" id="ivQ" value="1" style="flex:1; text-align:center; border:2px solid #eee; border-radius:12px"><button onclick="sendV()" style="padding:0 20px; background:var(--pri); color:#fff; border-radius:12px; font-weight:900">追蹤</button></div></div>
    <div class="iv-grid">
      ${ids.map(id => {
                const item = iv[id], low = item.q <= 1;
                return `
          <div class="iv-card ${low ? (item.q == 0 ? 'zero' : 'low') : ''}">
            <div class="iv-name">${item.n}</div>
            <div class="iv-qty">${item.q}</div>
            <div style="display:flex; justify-content:center; gap:12px">
              <button onclick="chgV('${id}',-1)" style="width:35px; height:35px; border:none; border-radius:50%">-</button>
              <button onclick="chgV('${id}',1)" style="width:35px; height:35px; border:none; border-radius:50%">+</button>
            </div>
            ${low ? `<button class="iv-btn" onclick="v2b('${id}')">🛒 我去買</button>` : ''}
          </div>`;
            }).join('')}
    </div>`;
        }

        // 5. 操作邏輯
        function sendT(toId) {
            const tt = document.getElementById('tIn').value; if (!tt) return;
            if (!toId) toId = Object.keys(DB.m).find(id => id != meId) || meId;
            if (!DB.t) DB.t = {};
            DB.t['t' + Date.now()] = { tt, fr: meId, to: toId, done: false };
            syncToCloud(); toast("已指派！✉️");
        }
        function taskDone(id) { DB.t[id].done = true; syncToCloud(); toast("太棒了！🎉"); }

        function sendB() {
            const n = document.getElementById('bIn').value; if (!n) return;
            if (!DB.s) DB.s = {};
            DB.s['s' + Date.now()] = { n, by: meId, done: false };
            syncToCloud(); document.getElementById('bIn').value = '';
        }
        function buyDone(id) {
            const item = DB.s[id]; item.done = true;
            if (!DB.v) DB.v = {};
            const exists = Object.keys(DB.v).find(k => DB.v[k].n == item.n);
            if (exists) DB.v[exists].q += 1; else DB.v['v' + Date.now()] = { n: item.n, q: 1 };
            syncToCloud(); toast(item.n + " 已買到，自動入庫！");
        }

        function sendV() {
            const n = document.getElementById('ivN').value, q = parseInt(document.getElementById('ivQ').value); if (!n) return;
            if (!DB.v) DB.v = {};
            DB.v['v' + Date.now()] = { n, q }; syncToCloud();
        }
        function chgV(id, d) { DB.v[id].q = Math.max(0, DB.v[id].q + d); syncToCloud(); }
        function v2b(id) {
            const n = DB.v[id].n;
            if (!DB.s) DB.s = {}; DB.s['s' + Date.now()] = { n, by: meId, done: false };
            syncToCloud(); toast("已同步至採買清單");
        }

        // 6. 工具介面邏輯
        function copyInvite() {
            const url = window.location.href.split('?')[0] + '?join=' + familyKey;
            navigator.clipboard.writeText(url).then(() => toast("🔗 安全連結已複製，傳給家人吧！"));
        }
        function openSt() {
            document.getElementById('stNote').value = DB.m[meId].note || '';
            document.getElementById('stDrawer').classList.remove('off');
        }
        function saveSt() {
            DB.m[meId].note = document.getElementById('stNote').value.trim();
            syncToCloud();
            document.getElementById('stDrawer').classList.add('off');
        }
        function updateBadges() {
            const ts = DB.t || {}, mys = Object.keys(ts).filter(i => ts[i].to == meId && !ts[i].done).length;
            const dotT = document.getElementById('dotT'); dotT.style.display = mys > 0 ? 'flex' : 'none'; dotT.textContent = mys;
        }
        function toast(m) {
            const t = document.getElementById('toast');
            t.textContent = m; t.style.opacity = 1;
            setTimeout(() => t.style.opacity = 0, 2500);
        }
    </script>
</body>

</html>
