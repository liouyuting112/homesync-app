<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>HomeSync 家庭管家 | 真正連動版</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700;900&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>

    <style>
        :root {
            --pri: #6366f1;
            --pri-bg: #f5f6ff;
            --bg: #f9fafb;
            --w: #fff;
            --txt: #111827;
            --sub: #6b7280;
            --grn: #10b981;
            --red: #ef4444;
            --rad: 28px;
            --sh: 0 15px 30px -5px rgba(0, 0, 0, 0.1);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'Noto Sans TC', sans-serif;
            background: #f1f5f9;
            color: var(--txt);
            display: flex;
            justify-content: center;
            min-height: 100vh;
        }

        .shell {
            width: 100%;
            max-width: 440px;
            background: #fff;
            display: flex;
            flex-direction: column;
            position: relative;
            min-height: 100vh;
            box-shadow: 0 0 50px rgba(0, 0, 0, 0.1);
            overflow-x: hidden;
        }

        /* 引導介面 */
        .onboard {
            position: fixed;
            inset: 0;
            z-index: 9999;
            background: #fff;
            display: flex;
            flex-direction: column;
            padding: 40px 25px;
            max-width: 440px;
            margin: 0 auto;
            transition: 0.4s;
        }

        .onboard.hide {
            opacity: 0;
            pointer-events: none;
            transform: translateY(30px);
        }

        .step {
            flex: 1;
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
        }

        .step.active {
            display: flex;
        }

        .onboard h1 {
            font-size: 34px;
            font-weight: 900;
            color: var(--pri);
            margin-bottom: 10px;
        }

        .onboard p {
            color: var(--sub);
            font-size: 15px;
            margin-bottom: 30px;
            line-height: 1.6;
        }

        .inp-f {
            width: 100%;
            border: 3px solid #f1f5f9;
            background: #f8fafc;
            padding: 20px;
            border-radius: 22px;
            font-size: 18px;
            font-weight: 800;
            text-align: center;
            margin-bottom: 20px;
            outline: none;
            transition: 0.2s;
        }

        .inp-f:focus {
            border-color: var(--pri);
            background: #fff;
        }

        .btn-p {
            width: 100%;
            padding: 20px;
            border-radius: 100px;
            background: var(--pri);
            color: #fff;
            font-size: 18px;
            font-weight: 900;
            border: none;
            cursor: pointer;
            box-shadow: 0 12px 25px rgba(99, 102, 241, 0.35);
            transition: 0.2s;
        }

        .btn-p:active {
            transform: scale(0.96);
        }

        /* 角色網格 (修復不連動關鍵) */
        .role-grid {
            width: 100%;
            max-height: 45vh;
            overflow-y: auto;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 20px;
            padding: 10px;
        }

        .role-i {
            background: #fff;
            border: 3px solid #f1f5f9;
            border-radius: 25px;
            padding: 25px 10px;
            cursor: pointer;
            transition: 0.2s;
            text-align: center;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.02);
        }

        .role-i.on {
            border-color: var(--pri);
            background: var(--pri-bg);
            transform: scale(1.05);
        }

        .role-i .em {
            font-size: 48px;
            display: block;
            margin-bottom: 10px;
        }

        .role-i b {
            font-size: 16px;
            font-weight: 900;
        }

        .add-tool {
            background: #f1f5f9;
            padding: 25px;
            border-radius: 30px;
            width: 100%;
            margin-bottom: 20px;
            text-align: left;
        }

        .inp-row {
            display: flex;
            gap: 10px;
        }

        .inp-row input {
            flex: 1;
            border: none;
            padding: 16px;
            border-radius: 18px;
            font-weight: 800;
            font-size: 16px;
            outline: none;
        }

        .inp-row button {
            background: var(--pri);
            color: #fff;
            border: none;
            padding: 0 25px;
            border-radius: 18px;
            font-weight: 900;
        }

        /* 主 App */
        #app {
            display: none;
            flex: 1;
            flex-direction: column;
        }

        .header {
            padding: 30px 20px 20px;
            background: #fff;
            border-bottom: 1px solid #f1f5f9;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .header-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .header h2 {
            font-weight: 900;
            color: var(--pri);
            font-size: 26px;
        }

        .share-pill {
            background: #fcd34d;
            color: #92400e;
            padding: 10px 18px;
            border-radius: 15px;
            font-size: 13px;
            font-weight: 900;
            cursor: pointer;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% {
                box-shadow: 0 0 0 0 rgba(252, 211, 77, 0.7);
            }

            70% {
                box-shadow: 0 0 0 10px rgba(252, 211, 77, 0);
            }

            100% {
                box-shadow: 0 0 0 0 rgba(252, 211, 77, 0);
            }
        }

        .wall {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .p-card {
            display: flex;
            align-items: center;
            gap: 15px;
            padding: 15px 20px;
            background: #f9fafb;
            border-radius: 22px;
            transition: 0.3s;
        }

        .p-card.me {
            background: var(--pri-bg);
            border-left: 6px solid var(--pri);
        }

        .p-av {
            width: 50px;
            height: 50px;
            background: #fff;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 26px;
            box-shadow: var(--sh);
        }

        .main {
            flex: 1;
            padding: 25px 20px 140px;
        }

        .empty-state {
            text-align: center;
            margin-top: 80px;
            color: var(--sub);
        }

        .nav {
            position: fixed;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 100%;
            max-width: 440px;
            background: rgba(255, 255, 255, 0.98);
            backdrop-filter: blur(15px);
            border-top: 1px solid #f1f5f9;
            display: flex;
            padding: 15px 0 35px;
            z-index: 500;
        }

        .nav-i {
            flex: 1;
            text-align: center;
            color: var(--sub);
            font-size: 11px;
            font-weight: 900;
        }

        .nav-i.on {
            color: var(--pri);
        }

        .nav-i .ic {
            font-size: 26px;
            display: block;
            margin-bottom: 4px;
        }

        #toast {
            position: fixed;
            bottom: 120px;
            left: 50%;
            transform: translateX(-50%);
            background: #1e293b;
            color: #fff;
            padding: 12px 30px;
            border-radius: 50px;
            font-size: 14px;
            font-weight: 800;
            opacity: 0;
            transition: .3s;
            z-index: 9999;
        }
    </style>
</head>

<body>

    <div class="shell">
        <div class="onboard" id="ob-wall">
            <div class="step" id="step-name">
                <div style="font-size:65px">🏰</div>
                <h1>幸福之家</h1>
                <p>第一步：請先為您的家庭空間命名</p>
                <input class="inp-f" id="i-f-name" placeholder="例如：亮亮家、幸福小屋" maxlength="12">
                <button class="btn-p" onclick="doNameHome()">按此建立家庭 ✨</button>
            </div>

            <div class="step" id="step-role">
                <h1 id="role-title">我是誰？</h1>
                <p>第二步：請在下方「新增」或「點選」您的身分</p>
                <div class="role-grid" id="role-render"></div>
                <div class="add-tool">
                    <div class="inp-row">
                        <input id="i-m-name" placeholder="輸入您的名字 (如:爸爸)" maxlength="6">
                        <button onclick="addMember()">新增</button>
                    </div>
                </div>
                <button class="btn-p" id="btn-enter" disabled onclick="enterTool()">確定是我，進入工具 ✨</button>
            </div>
        </div>

        <div id="app">
            <header class="header">
                <div class="header-row">
                    <div>
                        <h2 id="show-f-name">HomeSync</h2>
                        <div style="font-size:10px; color:var(--grn); font-weight:900; margin-top:5px">● 實時雲端同步中</div>
                    </div>
                    <div class="share-pill" onclick="copyLink()">🔗 分享給家人</div>
                </div>
                <div class="wall" id="wall-render"></div>
            </header>
            <main class="main">
                <div class="empty-state">
                    <div style="font-size:70px">🌈</div>
                    <h3 style="margin-top:15px">家庭空間已連動</h3>
                    <p style="font-size:13px; margin-top:10px">您與家人的任務與物品會在這裡同步顯示</p>
                </div>
            </main>
            <nav class="nav">
                <div class="nav-i on"><span class="ic">🏠</span>首頁</div>
                <div class="nav-i"><span class="ic">✋</span>託付</div>
                <div class="nav-i"><span class="ic">🛒</span>採買</div>
                <div class="nav-i"><span class="ic">📦</span>庫存</div>
            </nav>
        </div>
    </div>

    <div id="toast"></div>

    <script>
        // --- 分項連動引擎 (V10) ---
        const config = { databaseURL: "https://homesync-private-default-rtdb.firebaseio.com" };
        firebase.initializeApp(config);
        const rdb = firebase.database();

        let famK = '', famN = '', meId = '', members = {};

        (function init() {
            const p = new URLSearchParams(location.search);
            const joinCode = p.get('join');
            const savedK = localStorage.getItem('hs_k_v10');

            if (joinCode) {
                famK = joinCode;
                startSync();
            } else if (savedK) {
                famK = savedK;
                meId = localStorage.getItem('hs_me_' + famK);
                startSync();
                if (meId) {
                    document.getElementById('ob-wall').classList.add('hide');
                    document.getElementById('app').style.display = 'flex';
                }
            } else {
                show('name');
            }
        })();

        function show(s) {
            document.querySelectorAll('.step').forEach(d => d.classList.remove('active'));
            document.getElementById('step-' + s).classList.add('active');
        }

        // 關鍵修復：分項同步，不互相蓋掉
        function startSync() {
            // 獲取家名
            rdb.ref(`hs/v10/${famK}/name`).on('value', s => {
                famN = s.val() || '我們的家';
                document.getElementById('show-f-name').textContent = famN;
                document.getElementById('role-title').textContent = famN + " 是誰？";
            });

            // 實時監聽成員（分項讀取）
            rdb.ref(`hs/v10/${famK}/m`).on('value', snap => {
                const data = snap.val() || {};
                members = {};
                Object.keys(data).forEach(id => {
                    try {
                        const bytes = CryptoJS.AES.decrypt(data[id], famK);
                        members[id] = JSON.parse(bytes.toString(CryptoJS.enc.Utf8));
                    } catch (e) { }
                });
                renderUI();
            });
            show('role');
        }

        function doNameHome() {
            const val = document.getElementById('i-f-name').value.trim();
            if (!val) return;
            famN = val;
            famK = 'F' + Math.random().toString(36).substr(2, 9);
            localStorage.setItem('hs_k_v10', famK);
            rdb.ref(`hs/v10/${famK}/name`).set(famN);
            startSync();
        }

        function renderUI() {
            // 渲染選擇頁
            const grid = document.getElementById('role-render');
            grid.innerHTML = Object.keys(members).map(id => `
        <div class="role-i ${meId == id ? 'on' : ''}" onclick="setMe('${id}')">
            <span class="em">${members[id].e || '🙋'}</span>
            <b>${members[id].n}</b>
        </div>
    `).join('');

            // 渲染主牆
            if (meId) {
                document.getElementById('wall-render').innerHTML = Object.keys(members).map(id => `
            <div class="p-card ${id == meId ? 'me' : ''}">
                <div class="p-av">${members[id].e || '🙋'}</div>
                <b>${members[id].n}${id == meId ? ' (我)' : ''}</b>
            </div>
        `).join('');
            }
        }

        function setMe(id) {
            meId = id;
            renderUI();
            document.getElementById('btn-enter').disabled = false;
        }

        function addMember() {
            const n = document.getElementById('i-m-name').value.trim();
            if (!n) return;
            const mid = 'M' + Date.now();
            const mObj = { n, e: '🙋', ts: Date.now() };
            const enc = CryptoJS.AES.encrypt(JSON.stringify(mObj), famK).toString();
            rdb.ref(`hs/v10/${famK}/m/${mid}`).set(enc); // 分項寫入，不影響他人
            document.getElementById('i-m-name').value = '';
            toast('新增成功！請點選您的頭像進入');
        }

        function enterTool() {
            if (!meId) return;
            localStorage.setItem('hs_me_' + famK, meId);
            document.getElementById('ob-wall').classList.add('hide');
            document.getElementById('app').style.display = 'flex';
            renderUI();
        }

        function copyLink() {
            const url = window.location.href.split('?')[0] + '?join=' + famK;
            navigator.clipboard.writeText(url).then(() => toast('🔗 家庭同步連結已複製！傳給家人吧'));
        }

        function toast(m) { const t = document.getElementById('toast'); t.textContent = m; t.style.opacity = 1; setTimeout(() => t.style.opacity = 0, 2500); }
    </script>
</body>

</html>
