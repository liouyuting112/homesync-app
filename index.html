<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self' https: 'unsafe-inline' 'unsafe-eval';">
    <title>HomeSync | 國防級資安家庭管家</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap"
        rel="stylesheet">
    <!-- 資安與雲端庫 -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>

    <style>
        :root {
            --pri: #7c3aed;
            --priL: #f5f3ff;
            --bg: #f8fafc;
            --w: #ffffff;
            --txt: #0f172a;
            --sub: #64748b;
            --grn: #10b981;
            --org: #f59e0b;
            --red: #ef4444;
            --rad: 24px;
            --sh: 0 12px 20px -5px rgba(0, 0, 0, 0.08);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'Noto Sans TC', sans-serif;
            background: #e5e7eb;
            color: var(--txt);
            min-height: 100vh;
            display: flex;
            justify-content: center;
        }

        /* 強制手機視角，解決跑版與拉伸 */
        .shell {
            width: 100%;
            max-width: 440px;
            min-height: 100vh;
            background: var(--w);
            display: flex;
            flex-direction: column;
            position: relative;
            box-shadow: 0 0 50px rgba(0, 0, 0, 0.1);
        }

        /* 初始化頁面 */
        .sc-init {
            position: fixed;
            inset: 0;
            z-index: 9000;
            background: linear-gradient(135deg, #7c3aed 0%, #a855f7 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 25px;
        }

        .sc-init.hide {
            opacity: 0;
            pointer-events: none;
            transition: 0.4s;
        }

        .card-init {
            background: #fff;
            width: 100%;
            border-radius: 35px;
            padding: 45px 25px;
            text-align: center;
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.3);
        }

        .card-init h1 {
            font-weight: 900;
            font-size: 32px;
            color: var(--pri);
            margin-bottom: 10px;
        }

        .card-init p {
            font-size: 13px;
            color: var(--sub);
            line-height: 1.6;
            margin-bottom: 30px;
        }

        .inp-init {
            width: 100%;
            border: 3px solid #f1f5f9;
            background: #f8fafc;
            padding: 18px;
            border-radius: 20px;
            font-size: 16px;
            font-weight: 900;
            text-align: center;
            margin-bottom: 15px;
            outline: none;
            transition: 0.2s;
        }

        .inp-init:focus {
            border-color: var(--pri);
            background: #fff;
            border-width: 3px;
        }

        .btn-pri {
            width: 100%;
            padding: 18px;
            border: none;
            border-radius: 100px;
            font-size: 17px;
            font-weight: 900;
            color: #fff;
            background: var(--pri);
            cursor: pointer;
            box-shadow: 0 10px 25px rgba(124, 58, 237, 0.35);
            transition: 0.2s;
        }

        .btn-pri:active {
            transform: scale(0.96);
        }

        /* 安全標章 */
        .sec-tag {
            font-size: 10px;
            font-weight: 900;
            color: #059669;
            background: #d1fae5;
            padding: 5px 14px;
            border-radius: 10px;
            display: inline-flex;
            align-items: center;
            gap: 5px;
            margin-bottom: 15px;
        }

        /* 角色頁 (修復清單顯示問題) */
        .sc-role {
            position: fixed;
            inset: 0;
            z-index: 8000;
            background: #fff;
            padding: 45px 20px;
            display: none;
            flex-direction: column;
            max-width: 440px;
            left: 50%;
            transform: translateX(-50%);
        }

        .role-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin: 20px 0;
            overflow-y: auto;
            max-height: 45vh;
            padding: 5px;
        }

        .role-c {
            background: var(--bg);
            border: 3.5px solid transparent;
            border-radius: 22px;
            padding: 25px 10px;
            text-align: center;
            transition: 0.2s;
        }

        .role-c.on {
            border-color: var(--pri);
            background: var(--priL);
        }

        .role-c .em {
            font-size: 45px;
            display: block;
            margin-bottom: 5px;
        }

        .role-c .nm {
            font-size: 15px;
            font-weight: 900;
        }

        /* 主介面 */
        #sc-app {
            display: none;
            flex: 1;
            flex-direction: column;
            overflow: hidden;
        }

        .header {
            padding: 25px 20px 15px;
            background: #fff;
            border-bottom: 1px solid #f1f5f9;
        }

        .header-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }

        .header h1 {
            font-size: 24px;
            font-weight: 900;
            color: var(--pri);
        }

        .inv-btn {
            font-size: 11px;
            font-weight: 900;
            color: #92400e;
            background: #fef3c7;
            padding: 8px 15px;
            border-radius: 12px;
            cursor: pointer;
        }

        /* 人員動態 */
        .wall {
            display: flex;
            flex-direction: column;
            gap: 8px;
            padding-bottom: 15px;
            border-bottom: 1px solid #f1f5f9;
        }

        .ppl-i {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px;
            background: var(--bg);
            border-radius: 18px;
        }

        .ppl-i.me {
            background: var(--priL);
            border: 2px solid rgba(124, 58, 237, 0.1);
        }

        .ppl-av {
            width: 44px;
            height: 44px;
            background: #fff;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
            box-shadow: var(--sh);
        }

        .ppl-info {
            flex: 1;
        }

        .ppl-info b {
            font-size: 15px;
            font-weight: 900;
            display: block;
        }

        .ppl-note {
            font-size: 11px;
            color: var(--sub);
            margin-top: 2px;
        }

        /* 內容板塊 */
        .main {
            flex: 1;
            overflow-y: auto;
            padding: 0 18px 140px;
        }

        .section {
            display: none;
            animation: fIn 0.3s forwards;
        }

        .section.on {
            display: block;
        }

        @keyframes fIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: none;
            }
        }

        .title {
            font-size: 18px;
            font-weight: 900;
            margin: 25px 0 12px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .badge {
            font-size: 10px;
            background: var(--red);
            color: #fff;
            padding: 2px 8px;
            border-radius: 10px;
            font-weight: 900;
        }

        .box {
            background: #fff;
            border-radius: var(--rad);
            padding: 18px;
            margin-bottom: 12px;
            box-shadow: var(--sh);
            border: 1px solid rgba(0, 0, 0, 0.02);
        }

        .box-act {
            background: linear-gradient(135deg, #7c3aed, #a78bfa);
            color: #fff;
            border: none;
        }

        .box-row {
            display: flex;
            align-items: center;
            gap: 12px;
            cursor: pointer;
        }

        /* 輸入與按鈕 */
        .inp-row {
            display: flex;
            gap: 8px;
            background: #f3f4f6;
            padding: 6px;
            border-radius: 18px;
            margin-bottom: 12px;
        }

        .inp-row input {
            flex: 1;
            border: none;
            background: transparent;
            padding: 12px;
            font-size: 15px;
            font-weight: 700;
            outline: none;
        }

        .inp-row button {
            background: var(--pri);
            color: #fff;
            border-radius: 14px;
            padding: 0 18px;
            font-weight: 900;
            font-size: 14px;
        }

        /* 指派清單 */
        .pk-row {
            display: flex;
            gap: 8px;
            overflow-x: auto;
            padding-bottom: 10px;
            margin-bottom: 15px;
        }

        .pk-row::-webkit-scrollbar {
            display: none;
        }

        .pk-item {
            flex-shrink: 0;
            padding: 10px 18px;
            border-radius: 15px;
            background: #f3f4f6;
            font-size: 13px;
            font-weight: 800;
            border: 2.5px solid transparent;
        }

        .pk-item.on {
            border-color: var(--pri);
            background: var(--priL);
            color: var(--pri);
        }

        /* 任務回覆與庫存 */
        .tk-reply {
            margin-top: 10px;
            padding: 12px;
            background: #f9fafb;
            border-radius: 15px;
            border-left: 4px solid var(--org);
            font-size: 13px;
            color: var(--sub);
        }

        .btn-done {
            background: var(--grn);
            color: #fff;
            padding: 10px 18px;
            border-radius: 14px;
            font-weight: 900;
            font-size: 13px;
            white-space: nowrap;
        }

        .iv-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }

        .iv-card {
            background: #fff;
            border-radius: var(--rad);
            padding: 18px;
            text-align: center;
            box-shadow: var(--sh);
            border: 2.5px solid transparent;
        }

        .iv-card.low {
            border-color: var(--org);
            background: #fffbeb;
        }

        .iv-card.zero {
            border-color: var(--red);
            background: #fef2f2;
        }

        .iv-ctrl {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin-top: 10px;
        }

        .iv-ctrl button {
            width: 32px;
            height: 32px;
            border: none;
            border-radius: 50%;
            background: #f1f5f9;
            font-size: 18px;
        }

        /* 導航 */
        .nav {
            position: fixed;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 100%;
            max-width: 440px;
            background: rgba(255, 255, 255, 0.96);
            backdrop-filter: blur(15px);
            border-top: 1px solid #f1f5f9;
            display: flex;
            padding: 12px 0 35px;
            z-index: 500;
        }

        .nav-i {
            flex: 1;
            text-align: center;
            color: var(--sub);
            font-size: 11px;
            font-weight: 800;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            position: relative;
        }

        .nav-i.on {
            color: var(--pri);
        }

        .nav-i .ic {
            font-size: 24px;
        }

        .nav-i .dot {
            position: absolute;
            top: -6px;
            right: 20%;
            background: var(--red);
            color: #fff;
            min-width: 18px;
            height: 18px;
            border-radius: 10px;
            font-size: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 2px solid #fff;
        }

        #toast {
            position: fixed;
            top: 50px;
            left: 50%;
            transform: translateX(-50%);
            background: #1e293b;
            color: #fff;
            padding: 12px 30px;
            border-radius: 50px;
            font-size: 14px;
            font-weight: 800;
            opacity: 0;
            transition: .3s;
            z-index: 9999;
            pointer-events: none;
        }
    </style>
</head>

<body>

    <div class="shell">
        <!-- 建立 / 加入 -->
        <div class="sc-init" id="pgInit">
            <div class="card-init" id="mdStart">
                <div class="sec-tag">🛡️ 軍事級端對端加密已開啟</div>
                <h1>HomeSync</h1>
                <p>您的私人家庭空間。<br>資料均經過本地加密後才同步至雲端。</p>
                <input class="inp-init" id="iName" placeholder="輸入家名 (例: 我們這一家)" maxlength="12">
                <button class="btn-pri" onclick="initHome()">建立我的私密家庭 ✨</button>
                <p style="font-size:10px; color:var(--sub); margin-top:15px">※ 建立後分享邀請連結給家人即可</p>
            </div>
            <div class="card-init" id="mdJoin" style="display:none">
                <div class="sec-tag">🔐 您收到私密邀請</div>
                <h2>進入家庭</h2>
                <p>點擊按鈕加入以下家庭空間：</p>
                <div id="joinWho" style="font-weight:900; color:var(--pri); font-size:22px; margin:20px 0"></div>
                <button class="btn-pri" onclick="verifyJoin()">點此立刻加入 →</button>
            </div>
        </div>

        <!-- 角色選擇 -->
        <div class="sc-role" id="pgRole">
            <h2 style="font-weight:900">你是家裡的誰？</h2>
            <div class="role-grid" id="roleGrid"></div>
            <div style="background:#f1f5f9; padding:20px; border-radius:22px; margin-top:auto">
                <p style="font-size:12px; font-weight:900; color:var(--sub); margin-bottom:10px">沒在名單上？新增一名成員：</p>
                <div style="display:flex; gap:10px">
                    <input id="newMName" placeholder="輸入名字"
                        style="flex:1; border:none; padding:15px; border-radius:15px; font-weight:800; outline:none">
                    <button onclick="addM()"
                        style="background:var(--pri); color:#fff; border:none; padding:0 20px; border-radius:15px; font-weight:900">新增</button>
                </div>
            </div>
            <button class="btn-pri" id="btnBoot" disabled onclick="bootApp()" style="margin-top:15px">確定是我，進入！
                ✨</button>
        </div>

        <!-- 主App -->
        <div id="sc-app">
            <header class="header">
                <div class="header-row">
                    <h1 id="topNm">HomeSync</h1>
                    <div class="inv-btn" onclick="copyInv()"><span>🔗</span>邀請家人</div>
                </div>
                <div class="wall" id="wall"></div>
            </header>
            <main class="main" id="view"></main>
            <nav class="nav">
                <div class="nav-i on" onclick="tab('dash')"><span class="ic">🏠</span>首頁</div>
                <div class="nav-i" onclick="tab('task')"><span class="ic">✋</span>託付<div class="dot" id="dotT"
                        style="display:none">0</div>
                </div>
                <div class="nav-i" onclick="tab('buy')"><span class="ic">🛒</span>採買<div class="dot" id="dotB"
                        style="display:none">0</div>
                </div>
                <div class="nav-i" onclick="tab('inv')"><span class="ic">📦</span>庫存</div>
            </nav>
        </div>
    </div>

    <div id="toast"></div>

    <script>
        // ===== 硬核資安引擎 (全自動雙重儲存) =====
        const CONFIG = { databaseURL: "https://homesync-app-default-rtdb.firebaseio.com" };
        firebase.initializeApp(CONFIG);
        const rdb = firebase.database();

        let famKey = '', famNm = '', meId = '', activeTab = 'dash', curToId = '', DB = { m: {}, t: {}, s: {}, v: {} };

        // 1. 初始化
        (function () {
            const p = new URLSearchParams(location.search);
            const inv = p.get('join');
            const saved = localStorage.getItem('hs_key');

            if (inv) {
                famKey = inv;
                document.getElementById('mdStart').style.display = 'none';
                document.getElementById('mdJoin').style.display = 'block';
                rdb.ref('hs/v4/' + famKey + '/name').once('value', s => {
                    document.getElementById('joinWho').textContent = '「' + (s.val() || '家') + '」';
                });
            } else if (saved) {
                famKey = saved;
                connectCloud();
            }
        })();

        function connectCloud() {
            localStorage.setItem('hs_key', famKey);
            // 先讀本地快取，確保「絕不空白」
            const localCache = localStorage.getItem('hs_data_' + famKey);
            if (localCache) {
                try {
                    const bytes = CryptoJS.AES.decrypt(localCache, famKey);
                    DB = JSON.parse(bytes.toString(CryptoJS.enc.Utf8));
                    renderRoles();
                } catch (e) { }
            }

            rdb.ref('hs/v4/' + famKey).on('value', snap => {
                const raw = snap.val();
                if (!raw) return;
                famNm = raw.name || '我家';
                if (raw.data) {
                    try {
                        const bytes = CryptoJS.AES.decrypt(raw.data, famKey);
                        DB = JSON.parse(bytes.toString(CryptoJS.enc.Utf8));
                        localStorage.setItem('hs_data_' + famKey, raw.data); // 更新本地快取
                    } catch (e) { }
                }
                renderRoles();
                if (meId) renderApp();
            });
            document.getElementById('pgInit').classList.add('hide');
            const lastMe = localStorage.getItem('hs_me_' + famKey);
            if (lastMe) { meId = lastMe; bootApp(); }
            else { document.getElementById('pgRole').style.display = 'flex'; }
        }

        function sync() {
            const enc = CryptoJS.AES.encrypt(JSON.stringify(DB), famKey).toString();
            localStorage.setItem('hs_data_' + famKey, enc);
            rdb.ref('hs/v4/' + famKey).update({ name: famNm, data: enc, ts: Date.now() });
        }

        function initHome() {
            const n = document.getElementById('iName').value.trim(); if (!n) return;
            famNm = n;
            famKey = 'k' + CryptoJS.lib.WordArray.random(16).toString();
            connectCloud();
            sync();
        }

        function verifyJoin() { connectCloud(); }

        // 2. 角色管理
        function renderRoles() {
            const ms = DB.m || {};
            document.getElementById('roleGrid').innerHTML = Object.keys(ms).map(id => `
    <div class="role-c ${meId == id ? 'on' : ''}" onclick="selMe('${id}')">
      <span class="em">${ms[id].e || '🙋'}</span>
      <div class="nm">${ms[id].n}</div>
    </div>
  `).join('');
        }
        function selMe(id) { meId = id; document.getElementById('btnBoot').disabled = false; renderRoles(); }
        function addM() {
            const n = document.getElementById('newMName').value.trim(); if (!n) return;
            const id = 'm' + Date.now();
            if (!DB.m) DB.m = {};
            DB.m[id] = { n, e: '🙋', s: 'home', note: '' };
            sync();
            document.getElementById('newMName').value = '';
        }
        function bootApp() {
            localStorage.setItem('hs_me_' + famKey, meId);
            document.getElementById('pgRole').style.display = 'none';
            document.getElementById('sc-app').style.display = 'flex';
            document.getElementById('topNm').textContent = famNm;
            renderApp();
        }

        // 3. UI 渲染
        function tab(t) { activeTab = t; renderApp(); }
        function renderApp() {
            renderWall();
            const v = document.getElementById('view');
            if (activeTab == 'dash') v.innerHTML = rDash();
            if (activeTab == 'task') v.innerHTML = rTask();
            if (activeTab == 'buy') v.innerHTML = rBuy();
            if (activeTab == 'inv') v.innerHTML = rInv();
            updateDots();
        }

        function renderWall() {
            const ms = DB.m || {};
            document.getElementById('wall').innerHTML = Object.keys(ms).map(id => {
                const m = ms[id];
                return `<div class="ppl-i ${id == meId ? 'me' : ''}" onclick="${id == meId ? 'toast(\'點擊右上角邀請家人\')' : ''}">
      <div class="ppl-av">${m.e}</div>
      <div class="ppl-info"><b>${m.n}${id == meId ? ' (我)' : ''}</b><p class="ppl-note">${m.note || '🏡 在家'}</p></div>
    </div>`;
            }).join('');
        }

        function rDash() {
            const ts = DB.t || {}, my = Object.keys(ts).filter(i => ts[i].to == meId && !ts[i].done);
            return `
    <div class="title">今日摘要 📋</div>
    ${my.length ? `<div class="box box-act" onclick="tab('task')"><h3 style="margin-bottom:5px">嘿！有 ${my.length} 個委託指派給你</h3><p style="font-size:13px;opacity:0.9">點此查看詳情並處理</p></div>` : ''}
    <div class="box box-row" onclick="tab('task')"><div style="font-size:28px">✋</div><b>指派任務給家人</b></div>
    <div class="box box-row" onclick="tab('buy')"><div style="font-size:28px">🛒</div><b>查看採買清單</b></div>`;
        }

        function rTask() {
            const ms = DB.m || {}, ts = DB.t || {};
            if (!curToId || !ms[curToId]) curToId = Object.keys(ms).find(i => i != meId) || meId;
            const my = Object.keys(ts).filter(i => ts[i].to == meId && !ts[i].done);
            return `
    <div class="title">發送委託 ✉️</div>
    <div class="box">
      <div class="inp-row"><input id="tI" placeholder="例如: 領包裹、買貓砂..."><button onclick="sendT()">送出</button></div>
      <div class="pk-row">${Object.keys(ms).map(id => `<div class="pk-item ${curToId == id ? 'on' : ''}" onclick="curToId='${id}';renderApp()">${ms[id].n}</div>`).join('')}</div>
    </div>
    <div class="title">👉 我要做的 <span>${my.length}</span></div>
    ${my.map(id => `<div class="box" style="border-left:5px solid var(--pri)"><div style="display:flex;justify-content:space-between;align-items:center"><div><b>${ts[id].tt}</b><p style="font-size:11px;color:var(--sub);margin-top:4px">由 ${ms[ts[id].fr].n} 託付</p></div><button class="btn-done" onclick="taskDone('${id}')">✓ 完成</button></div></div>`).join('') || '<p style="text-align:center;padding:30px;color:var(--sub)">目前一切安好 ☕️</p>'}`;
        }

        function rBuy() {
            const sh = DB.s || {}, ms = DB.m || {};
            const pend = Object.keys(sh).filter(i => !sh[i].done);
            return `
    <div class="title">採買清單 🛒</div>
    <div class="box"><div class="inp-row"><input id="bI" placeholder="想買什麼？"><button onclick="sendB()">加入</button></div></div>
    ${pend.map(id => `<div class="box box-row"><div style="width:30px;height:30px;border-radius:50%;border:3px solid #eee" onclick="buyDone('${id}')"></div><div style="flex:1;font-weight:900">${sh[id].n}</div><div style="font-size:10px;color:var(--sub)">${ms[sh[id].by].n} 想要</div></div>`).join('') || '<p style="text-align:center;padding:30px;color:var(--sub)">清單已清空！</p>'}`;
        }

        function rInv() {
            const iv = DB.v || {}, ids = Object.keys(iv);
            return `
    <div class="title">物資庫存 📦</div>
    <div class="box"><div style="display:flex;gap:8px"><input id="ivN" placeholder="物品" style="flex:2;padding:12px;border:2px solid #eee;border-radius:12px"><input type="number" id="ivQ" value="1" style="flex:1;text-align:center;border:2px solid #eee;border-radius:12px"><button onclick="sendV()" style="padding:0 15px;background:var(--pri);color:#fff;border-radius:12px;font-weight:900">追蹤</button></div></div>
    <div class="iv-grid">${ids.map(id => {
                const item = iv[id], low = item.q <= 1;
                return `<div class="iv-card ${item.q == 0 ? 'zero' : low ? 'low' : ''}"><b>${item.n}</b><div class="iv-qty">${item.q}</div><div class="iv-ctrl"><button onclick="chgV('${id}',-1)">-</button><button onclick="chgV('${id}',1)">+</button></div></div>`;
            }).join('')}</div>`;
        }

        // 4. 功能邏輯
        function sendT() {
            const tt = document.getElementById('tI').value; if (!tt) return;
            if (!DB.t) DB.t = {};
            DB.t['t' + Date.now()] = { tt, fr: meId, to: curToId, done: false };
            sync(); toast("已發送委託！");
        }
        function taskDone(id) { DB.t[id].done = true; sync(); toast("完成！🎉"); }
        function sendB() {
            const n = document.getElementById('bI').value; if (!n) return;
            if (!DB.s) DB.s = {};
            DB.s['s' + Date.now()] = { n, by: meId, done: false };
            sync(); document.getElementById('bI').value = '';
        }
        function buyDone(id) {
            const item = DB.s[id]; item.done = true;
            if (!DB.v) DB.v = {};
            const ex = Object.keys(DB.v).find(k => DB.v[k].n == item.n);
            if (ex) DB.v[ex].q += 1; else DB.v['v' + Date.now()] = { n: item.n, q: 1 };
            sync(); toast("已買到，自動入庫！");
        }
        function sendV() { const n = document.getElementById('ivN').value, q = parseInt(document.getElementById('ivQ').value); if (!n) return; if (!DB.v) DB.v = {}; DB.v['v' + Date.now()] = { n, q }; sync(); }
        function chgV(id, d) { DB.v[id].q = Math.max(0, DB.v[id].q + d); sync(); }

        function copyInv() {
            const url = window.location.href.split('?')[0] + '?join=' + famKey;
            navigator.clipboard.writeText(url).then(() => toast("🔗 安全連結已複製！傳給家人吧"));
        }
        function updateDots() {
            const ts = DB.t || {}, mys = Object.keys(ts).filter(i => ts[i].to == meId && !ts[i].done).length;
            const dotT = document.getElementById('dotT'); dotT.style.display = mys > 0 ? 'flex' : 'none'; dotT.textContent = mys;
        }
        function toast(m) { const t = document.getElementById('toast'); t.textContent = m; t.style.opacity = 1; setTimeout(() => t.style.opacity = 0, 2500); }
    </script>
</body>

</html>
